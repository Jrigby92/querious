<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Querious — learn SQL by doing</title>
<script src="https://cdn.jsdelivr.net/npm/sql.js@1.12.0/dist/sql-wasm.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
<style>
  :root{
    --bg:#0a0b14;
    --bg2:#0e1020;
    --panel:rgba(22,24,40,0.66);
    --panel-solid:#13152a;
    --stroke:rgba(255,255,255,0.08);
    --stroke-strong:rgba(255,255,255,0.16);
    --text:#e8eaf6;
    --muted:#9aa0bf;
    --faint:#6b7299;
    --accent:#7c5cff;
    --accent2:#22d3ee;
    --good:#34d399;
    --bad:#fb7185;
    --warn:#fbbf24;
    --key:#22d3ee;
    --ref:#34d399;
    --radius:16px;
    --mono:ui-monospace,"SF Mono",Menlo,Monaco,"Cascadia Code",Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{min-height:100%}
  body{
    margin:0;font-family:var(--sans);color:var(--text);
    background:
      radial-gradient(1100px 700px at 12% -8%, rgba(124,92,255,0.18), transparent 60%),
      radial-gradient(900px 600px at 100% 0%, rgba(34,211,238,0.12), transparent 55%),
      linear-gradient(180deg,var(--bg),var(--bg2));
    background-attachment:fixed;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:rgba(124,92,255,0.35)}
  a{color:var(--accent2);text-decoration:none}
  a:hover{text-decoration:underline}

  /* ---------- Top bar ---------- */
  header{
    position:sticky;top:0;z-index:30;
    display:flex;align-items:center;gap:18px;
    padding:14px 22px;
    background:rgba(10,11,20,0.72);
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--stroke);
  }
  .brand{display:flex;align-items:center;gap:11px;font-weight:700;letter-spacing:.2px}
  .logo{
    width:34px;height:34px;border-radius:10px;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    box-shadow:0 6px 22px rgba(124,92,255,0.45);
    font-size:18px;
  }
  .brand .name{font-size:18px}
  .brand .tag{font-size:12px;color:var(--muted);font-weight:500;margin-left:2px}
  .spacer{flex:1}
  .trackswitch{display:flex;gap:3px;padding:3px;border:1px solid var(--stroke);border-radius:11px;background:rgba(255,255,255,0.04);margin-left:14px}
  .track-btn{font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;color:var(--muted);background:transparent;border:none;border-radius:8px;padding:6px 16px;transition:.15s}
  .track-btn:hover{color:var(--text)}
  .track-btn.active{color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 4px 14px rgba(124,92,255,.4)}
  .track-btn .pytag{font-size:10px;opacity:.7;font-weight:600}

  .ability{
    display:flex;align-items:center;gap:12px;
    padding:7px 14px;border:1px solid var(--stroke);border-radius:999px;
    background:var(--panel);
  }
  .ability .lvl{font-weight:700;font-size:13px}
  .ability .lvl small{color:var(--muted);font-weight:500}
  .meter{width:140px;height:8px;border-radius:99px;background:rgba(255,255,255,0.08);overflow:hidden}
  .meter > i{
    display:block;height:100%;width:30%;border-radius:99px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    transition:width .7s cubic-bezier(.2,.8,.2,1);
  }
  .progress-chip{font-size:13px;color:var(--muted)}
  .progress-chip b{color:var(--text)}
  .btn{
    font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;
    color:var(--text);background:rgba(255,255,255,0.06);
    border:1px solid var(--stroke-strong);border-radius:10px;padding:8px 14px;
    transition:.15s;
  }
  .btn:hover{background:rgba(255,255,255,0.12);transform:translateY(-1px)}
  .btn.ghost{background:transparent}
  .btn.tiny{padding:5px 10px;font-size:12px;border-radius:8px}

  /* ---------- Layout ---------- */
  .app{display:grid;grid-template-columns:268px 1fr;gap:0;min-height:calc(100vh - 63px)}
  aside{
    border-right:1px solid var(--stroke);
    padding:18px 14px;position:sticky;top:63px;height:calc(100vh - 63px);overflow:auto;
  }
  .side-title{font-size:11px;text-transform:uppercase;letter-spacing:1.4px;color:var(--faint);margin:6px 8px 12px}
  .stage-divider{margin-top:16px;padding-top:14px;border-top:1px solid var(--stroke);color:#a5b4fc}
  .lesson-item{
    display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:12px;cursor:pointer;
    color:var(--muted);margin-bottom:3px;border:1px solid transparent;transition:.15s;font-size:14px;
  }
  .lesson-item:hover{background:rgba(255,255,255,0.05);color:var(--text)}
  .lesson-item.active{background:rgba(124,92,255,0.14);border-color:rgba(124,92,255,0.4);color:#fff}
  .lesson-item.locked{opacity:.45;cursor:not-allowed}
  .dot{
    width:24px;height:24px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;
    font-size:12px;font-weight:700;background:rgba(255,255,255,0.07);border:1px solid var(--stroke-strong);
  }
  .lesson-item.done .dot{background:linear-gradient(135deg,var(--good),#0ea5e9);border-color:transparent;color:#04211a}
  .lesson-item.active .dot{border-color:var(--accent)}
  .lesson-item .label{flex:1;line-height:1.25}
  .lesson-item .concept{display:block;font-size:11px;color:var(--faint)}
  .sandbox-link{margin-top:14px;border-top:1px solid var(--stroke);padding-top:14px}

  main{padding:26px 30px 80px;max-width:1180px;width:100%;margin:0 auto}

  .card{
    background:var(--panel);border:1px solid var(--stroke);border-radius:var(--radius);
    backdrop-filter:blur(10px);box-shadow:0 18px 50px rgba(0,0,0,0.35);
  }
  .pad{padding:22px 24px}

  .lesson-head h1{margin:0 0 4px;font-size:26px;letter-spacing:-0.3px}
  .lesson-head .crumbs{font-size:12px;color:var(--faint);text-transform:uppercase;letter-spacing:1.3px;margin-bottom:10px}
  .blurb{color:var(--muted);line-height:1.65;font-size:15px}
  .blurb code{font-family:var(--mono);background:rgba(124,92,255,0.16);color:#cbbcff;padding:2px 6px;border-radius:6px;font-size:13px}
  .goal{
    margin-top:18px;display:flex;gap:13px;align-items:flex-start;
    background:linear-gradient(90deg,rgba(124,92,255,0.14),rgba(34,211,238,0.06));
    border:1px solid rgba(124,92,255,0.3);border-radius:13px;padding:15px 17px;
  }
  .goal .gicon{font-size:20px;line-height:1.2}
  .goal .gtext{font-size:15px;line-height:1.5}
  .goal .gtext b{color:#fff}

  .section-label{font-size:11px;text-transform:uppercase;letter-spacing:1.4px;color:var(--faint);margin:26px 2px 12px;font-weight:700}

  /* ---------- Schema tables ---------- */
  .schema{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .tbl-card{background:rgba(13,15,30,0.6);border:1px solid var(--stroke);border-radius:14px;overflow:hidden}
  .tbl-card h3{
    margin:0;padding:12px 15px;font-size:14px;display:flex;align-items:center;gap:9px;
    border-bottom:1px solid var(--stroke);background:rgba(255,255,255,0.03);
  }
  .tbl-card h3 .pill{font-size:10px;font-weight:600;color:var(--faint);background:rgba(255,255,255,0.07);padding:2px 8px;border-radius:99px;text-transform:uppercase;letter-spacing:.6px}
  .tbl-wrap{overflow:auto;max-height:440px}
  table.data{border-collapse:collapse;width:100%;font-family:var(--mono);font-size:12.5px}
  table.data th,table.data td{padding:8px 12px;text-align:left;white-space:nowrap;border-bottom:1px solid rgba(255,255,255,0.05)}
  table.data th{color:var(--muted);font-weight:600;position:relative;transition:.25s}
  table.data td{color:#cfd3ee;transition:.25s}
  table.data tr:last-child td{border-bottom:none}
  table.data td.null{color:var(--faint);font-style:italic}
  /* highlight states */
  .col-ref{background:rgba(52,211,153,0.14)!important}
  th.col-ref{color:#a7f3d0!important;box-shadow:inset 0 -2px 0 var(--ref)}
  .col-key{background:rgba(34,211,238,0.18)!important}
  th.col-key{color:#a5f3fc!important;box-shadow:inset 0 -2px 0 var(--key)}
  th.col-key::after{content:"🔑";position:absolute;right:6px;top:7px;font-size:10px}
  /* row-level highlighting: which rows survive the query */
  table.data tbody tr{transition:opacity .25s}
  tr.row-hit td{background:rgba(52,211,153,0.07)}
  tr.row-hit td:first-child{box-shadow:inset 2.5px 0 0 var(--good)}
  tr.row-miss td{opacity:.32}

  /* ---------- JOIN visualizer ---------- */
  .joinviz{display:grid;grid-template-columns:300px 1fr;gap:22px;align-items:center}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .chip{
    cursor:pointer;font-size:13px;font-weight:600;padding:8px 13px;border-radius:10px;
    border:1px solid var(--stroke-strong);background:rgba(255,255,255,0.05);color:var(--muted);transition:.15s;
  }
  .chip:hover{color:#fff;background:rgba(255,255,255,0.1)}
  .chip.active{background:linear-gradient(135deg,rgba(124,92,255,.9),rgba(34,211,238,.85));color:#08111e;border-color:transparent;box-shadow:0 6px 18px rgba(124,92,255,.4)}
  .viz-explain{font-size:14px;color:var(--muted);line-height:1.6;min-height:48px}
  .viz-explain b{color:#fff}
  .viz-explain .ins{margin-top:10px}
  svg .region{transition:opacity .45s ease, fill .3s}
  svg .region{opacity:0}
  svg .region.on{opacity:1}
  svg .circ{fill:none;stroke:rgba(255,255,255,0.5);stroke-width:2}
  svg .clabel{fill:var(--text);font:600 14px var(--sans)}
  svg .csub{fill:var(--faint);font:500 11px var(--sans)}

  /* ---------- Editor ---------- */
  .editor-wrap{margin-top:6px}
  .editor-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .editor-toolbar .hint-note{font-size:13px;color:var(--muted);flex:1}
  .editor{
    position:relative;border:1px solid var(--stroke-strong);border-radius:13px;overflow:hidden;
    background:#0b0d1c;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .editor.focused{border-color:rgba(124,92,255,0.55);box-shadow:0 0 0 3px rgba(124,92,255,0.18)}
  .editor pre,.editor textarea{
    margin:0;padding:16px 18px;font-family:var(--mono);font-size:14.5px;line-height:1.6;
    tab-size:2;white-space:pre-wrap;word-break:break-word;
    border:0;width:100%;min-height:118px;
  }
  .editor pre{position:absolute;inset:0;pointer-events:none;overflow:auto;color:#dfe3ff}
  .editor textarea{
    position:relative;background:transparent;color:transparent;caret-color:#fff;resize:vertical;
    outline:none;-webkit-text-fill-color:transparent;
  }
  .editor textarea::selection{background:rgba(124,92,255,0.4)}
  .t-kw{color:#c4b5fd;font-weight:600}
  .t-fn{color:#67e8f9}
  .t-str{color:#86efac}
  .t-num{color:#fcd34d}
  .t-com{color:var(--faint);font-style:italic}

  .run-row{display:flex;gap:10px;margin-top:14px;align-items:center;flex-wrap:wrap}
  .btn.run{
    background:linear-gradient(135deg,var(--accent),#9b7bff);border:none;color:#fff;font-size:14px;padding:10px 22px;
    box-shadow:0 8px 22px rgba(124,92,255,.45);
  }
  .btn.run:hover{filter:brightness(1.08)}
  .kbd{font-family:var(--mono);font-size:11px;color:var(--faint);background:rgba(255,255,255,0.06);border:1px solid var(--stroke);border-radius:6px;padding:2px 6px}

  /* ---------- Results ---------- */
  .result{margin-top:18px}
  .banner{
    display:flex;align-items:center;gap:12px;padding:14px 17px;border-radius:13px;font-size:15px;margin-bottom:14px;
    animation:pop .35s cubic-bezier(.2,.9,.3,1.3);
  }
  @keyframes pop{from{transform:scale(.97);opacity:0}to{transform:scale(1);opacity:1}}
  .banner.ok{background:rgba(52,211,153,0.14);border:1px solid rgba(52,211,153,0.4);color:#a7f3d0}
  .banner.err{background:rgba(251,113,133,0.13);border:1px solid rgba(251,113,133,0.4);color:#fecdd3}
  .banner.warn{background:rgba(251,191,36,0.12);border:1px solid rgba(251,191,36,0.4);color:#fde68a}
  .banner .bicon{font-size:20px}
  .banner b{color:#fff}
  .banner .diag{display:inline-block;margin-top:7px;color:#fde68a;line-height:1.5}
  .banner .diag code{background:rgba(0,0,0,0.25);padding:1px 5px;border-radius:5px}
  .result-meta{font-size:12px;color:var(--faint);margin:4px 2px 10px}
  .result-scroll{overflow:auto;border:1px solid var(--stroke);border-radius:12px;max-height:340px}
  .pyout{margin:0;padding:14px 16px;font-family:var(--mono);font-size:13.5px;line-height:1.6;color:#cfe3d6;white-space:pre-wrap;word-break:break-word}

  .hints{margin-top:16px;display:flex;flex-direction:column;gap:10px}
  .hint{
    background:rgba(251,191,36,0.07);border:1px solid rgba(251,191,36,0.28);border-radius:12px;padding:12px 15px;
    font-size:14px;color:#fde9b8;display:flex;gap:10px;animation:pop .3s ease;
  }
  .hint .hicon{flex:0 0 auto}

  .empty{color:var(--faint);font-size:14px;padding:8px 2px}


  /* ---------- Skills sidebar ---------- */
  .skill-row{display:block;padding:9px 11px;border-radius:12px;cursor:pointer;border:1px solid transparent;color:var(--muted);margin-bottom:3px;transition:.15s}
  .skill-row:hover{background:rgba(255,255,255,0.05);color:var(--text)}
  .skill-row.active{background:rgba(124,92,255,0.14);border-color:rgba(124,92,255,0.4);color:#fff}
  .skill-row.locked{opacity:.45}
  .skill-top{display:flex;justify-content:space-between;align-items:center;font-size:13px;gap:8px}
  .skill-top .cnt{font-size:11px;color:var(--faint);font-family:var(--mono)}
  .skill-bar{height:5px;border-radius:99px;background:rgba(255,255,255,0.08);margin-top:6px;overflow:hidden}
  .skill-bar > i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s}
  .skill-row.mastered .skill-bar > i{background:linear-gradient(90deg,var(--good),#0ea5e9)}

  /* ---------- Auto-advance strip ---------- */
  .auto-next{display:flex;align-items:center;gap:12px;margin:0 0 12px;padding:10px 14px;border:1px solid rgba(52,211,153,0.35);background:rgba(52,211,153,0.08);border-radius:11px;font-size:13px;color:#a7f3d0}
  .auto-track{flex:1;height:5px;background:rgba(255,255,255,0.12);border-radius:99px;overflow:hidden}
  .auto-track > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--good),var(--accent2));animation:autofill 2.2s linear forwards}
  @keyframes autofill{to{width:100%}}

  /* ---------- Walkthrough (tutorial) ---------- */
  .tut{
    margin-top:20px;border-radius:14px;padding:16px 18px;
    border:1px solid rgba(34,211,238,0.35);
    background:linear-gradient(135deg,rgba(34,211,238,0.08),rgba(124,92,255,0.08));
  }
  .tut-head{display:flex;align-items:center;gap:12px}
  .tut-title{font-weight:700;font-size:14px;color:#a5f3fc;white-space:nowrap}
  .tut-count{color:var(--faint);font-weight:500;margin-left:6px}
  .tut-dots{flex:1;display:flex;gap:5px;justify-content:center;flex-wrap:wrap}
  .tdot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.15);transition:.25s}
  .tdot.on{background:linear-gradient(135deg,var(--accent),var(--accent2))}
  .tut-body{animation:pop .3s ease}
  .tut-say{margin:12px 0 4px}
  .tut-code{
    margin:12px 0 8px;padding:13px 16px;background:#0b0d1c;border:1px solid var(--stroke-strong);
    border-radius:11px;font-family:var(--mono);font-size:14px;line-height:1.6;
    white-space:pre-wrap;word-break:break-word;color:#dfe3ff;
  }
  .tut-new{
    display:inline-flex;gap:7px;align-items:center;font-size:12.5px;color:#fde68a;
    background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);
    border-radius:99px;padding:4px 12px;margin:2px 0 8px;
  }
  .tut-new code{font-family:var(--mono)}
  .tut-result{margin-top:10px}
  .tut-result .result-scroll{max-height:240px}
  .tut-nav{display:flex;gap:10px;margin-top:14px;align-items:center}
  .tut-nav #tut-next{margin-left:auto}

  /* loading / error overlay */
  .overlay{
    position:fixed;inset:0;z-index:100;display:grid;place-items:center;
    background:rgba(8,9,16,0.92);backdrop-filter:blur(8px);text-align:center;padding:30px;
  }
  .overlay .box{max-width:440px}
  .spinner{width:46px;height:46px;border-radius:50%;border:4px solid rgba(255,255,255,0.12);border-top-color:var(--accent);margin:0 auto 20px;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .overlay h2{margin:0 0 8px}
  .overlay p{color:var(--muted);line-height:1.6}

  .toast{
    position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(120px);
    background:var(--panel-solid);border:1px solid var(--stroke-strong);border-radius:14px;
    padding:14px 20px;display:flex;align-items:center;gap:14px;z-index:60;box-shadow:0 18px 50px rgba(0,0,0,0.5);
    transition:transform .45s cubic-bezier(.2,.9,.3,1.2);max-width:520px;
  }
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast .ttext{font-size:14px;line-height:1.4}
  .toast .ttext b{color:#fff}

  #confetti{position:fixed;inset:0;pointer-events:none;z-index:80}

  @media (max-width:980px){
    .app{grid-template-columns:1fr}
    aside{position:relative;top:0;height:auto;border-right:none;border-bottom:1px solid var(--stroke)}
    .schema{grid-template-columns:1fr}
    .joinviz{grid-template-columns:1fr}
    .meter{width:90px}
  }
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="box">
    <div class="spinner" id="spinner"></div>
    <h2 id="ov-title">Warming up the database…</h2>
    <p id="ov-msg">Loading a real SQLite engine so your queries actually run.</p>
  </div>
</div>

<header>
  <div class="brand">
    <div class="logo">◧</div>
    <div>
      <span class="name">Querious</span>
      <span class="tag">· learn by doing</span>
    </div>
  </div>
  <div class="trackswitch" id="trackswitch" role="tablist" aria-label="Choose a track">
    <button class="track-btn active" data-track="sql" role="tab">SQL</button>
    <button class="track-btn" data-track="python" role="tab">Python</button>
    <button class="track-btn" data-track="pandas" role="tab">pandas</button>
  </div>
  <div class="spacer"></div>
  <div class="ability" title="Auto-detected from how you solve each step">
    <div class="lvl"><span id="lvl-name">Novice</span> <small id="lvl-sub">· level 1</small></div>
    <div class="meter"><i id="meter-fill"></i></div>
  </div>
  <div class="progress-chip"><b id="prog-done">0</b>/<span id="prog-total">10</span> done</div>
  <button class="btn ghost tiny" id="reset-btn" title="Erase progress and start over">Reset</button>
</header>

<div class="app">
  <aside>
    <div class="side-title">Practice</div>
    <div id="lesson-list"></div>
    <div class="sandbox-link">
      <div class="lesson-item" id="sandbox-item" data-sandbox="1">
        <div class="dot">∞</div>
        <div class="label">Sandbox<span class="concept">run anything you like</span></div>
      </div>
    </div>
  </aside>

  <main id="main"><!-- lesson rendered here --></main>
</div>

<div class="toast" id="toast">
  <div class="ttext" id="toast-text"></div>
  <button class="btn tiny" id="toast-action" style="display:none"></button>
  <button class="btn ghost tiny" id="toast-dismiss">Dismiss</button>
</div>

<canvas id="confetti"></canvas>

<script>
/* ============================================================
   Querious v2 — adaptive practice engine
   200 generated questions · 14 skills · mastery-based selection
   ============================================================ */

/* ---------------- Data ---------------- */
const CUSTOMERS=[
  [1,'Ada','London',36],[2,'Grace','New York',41],[3,'Linus','Helsinki',28],
  [4,'Margaret','Boston',52],[5,'Alan','London',24],[6,'Katherine','New York',47],
  [7,'Tim','Helsinki',33],[8,'Radia','Boston',39],[9,'Edsger','Tokyo',58],
  [10,'Joan','London',62],[11,'Ken','Tokyo',19],[12,'Barbara','Tokyo',45]
];

function mulberry(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;let t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296};}
function seededShuffle(arr,seed){const r=mulberry(seed);for(let i=arr.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function fmtCols(cols){const b=cols.map(c=>'<b>'+c+'</b>');return b.length===1?b[0]:b.slice(0,-1).join(', ')+' and '+b[b.length-1];}
function Q(id,concept,level,title,prompt,solution,x){x=x||{};return{id,concept,level,title,prompt,solution,
  orderMatters:!!x.ord,requires:x.req||null,reqMsg:x.reqMsg||null,hints:x.hints||[]};}

  'lag-lead':[
    {say:"<code>LAG</code> reads a value from the <b>previous</b> row in the window; <code>LEAD</code> from the <b>next</b>. This is how you compute period-over-period change without joining a table to itself."},
    {say:"Monthly revenue with last month beside it. (First build the monthly totals in a CTE, then LAG over them.)", sql:"WITH monthly AS (\n  SELECT strftime('%Y-%m', order_date) AS mth, SUM(amount) AS rev\n  FROM orders GROUP BY 1\n)\nSELECT mth, rev, LAG(rev) OVER (ORDER BY mth) AS prev_rev\nFROM monthly", new:"LAG(x) OVER (ORDER BY …)", run:true},
    {say:"Subtract to get the change — the first month's previous is NULL, so the delta is NULL too.", sql:"WITH monthly AS (\n  SELECT strftime('%Y-%m', order_date) AS mth, SUM(amount) AS rev\n  FROM orders GROUP BY 1\n)\nSELECT mth, rev - LAG(rev) OVER (ORDER BY mth) AS change\nFROM monthly", new:"rev - LAG(rev)", run:true},
    {say:"Your turn — peek at the neighbouring row."}
  ],
  'dedup':[
    {say:"<b>The</b> dbt dedup / latest-record pattern. Goal: one row per key (e.g. each customer's most recent order). You rank within the key, then keep rank 1."},
    {say:"Step 1 — number each customer's orders, newest first:", sql:"SELECT customer_id, product, order_date,\n  ROW_NUMBER() OVER (PARTITION BY customer_id ORDER BY order_date DESC) AS rn\nFROM orders", new:"ROW_NUMBER() … ORDER BY date DESC", run:true},
    {say:"Step 2 — wrap it and keep only <code>rn = 1</code>. (Warehouses like Snowflake spell this <code>QUALIFY rn = 1</code>; SQLite needs the subquery/CTE wrapper.)", sql:"SELECT customer_id, product, order_date FROM (\n  SELECT customer_id, product, order_date,\n    ROW_NUMBER() OVER (PARTITION BY customer_id ORDER BY order_date DESC) AS rn\n  FROM orders\n) WHERE rn = 1", new:"wrap, then WHERE rn = 1", run:true},
    {say:"Your turn — grab one row per key."}
  ],
  'set-ops':[
    {say:"Set operators stack two result sets that have the <b>same columns</b>. <code>UNION</code> removes duplicates; <code>UNION ALL</code> keeps them (and is faster); <code>EXCEPT</code> subtracts; <code>INTERSECT</code> keeps the overlap."},
    {say:"Combine two filtered lists into one:", sql:"SELECT name FROM customers WHERE city = 'London'\nUNION\nSELECT name FROM customers WHERE city = 'Tokyo'", new:"… UNION …", run:true},
    {say:"<code>EXCEPT</code> subtracts one set from another — products that have sold but were never returned:", sql:"SELECT DISTINCT product FROM orders\nEXCEPT\nSELECT product FROM orders WHERE status = 'returned'", new:"… EXCEPT …", run:true},
    {say:"Your turn — combine the two sets the task describes."}
  ],
  'dates':[
    {say:"Time lives in <code>order_date</code> (ISO text like <code>'2024-03-05'</code>). Because ISO dates sort like text, you can filter them with plain comparisons, and reshape them with <code>strftime</code>."},
    {say:"Everything in March — a half-open range <code>[Mar 1, Apr 1)</code> is the safest filter:", sql:"SELECT product, amount, order_date FROM orders\nWHERE order_date >= '2024-03-01' AND order_date < '2024-04-01'", new:"order_date range filter", run:true},
    {say:"<code>strftime('%Y-%m', …)</code> truncates a date to its month — group by it for a monthly series (the dbt <code>date_trunc</code> equivalent).", sql:"SELECT strftime('%Y-%m', order_date) AS month, SUM(amount) AS revenue\nFROM orders GROUP BY 1 ORDER BY 1", new:"strftime('%Y-%m', …)", run:true},
    {say:"Your turn — work with the dates."}
  ],
  'ntile-frames':[
    {say:"Two finishing tools. <code>NTILE(n)</code> splits ordered rows into <b>n equal buckets</b> (quartiles, deciles). And a <b>frame</b> clause picks <i>which</i> rows around the current one a window sees."},
    {say:"Quartiles by price — bucket 1 is the cheapest quarter, 4 the priciest:", sql:"SELECT product, amount,\n  NTILE(4) OVER (ORDER BY amount) AS quartile\nFROM orders", new:"NTILE(n) OVER (ORDER BY …)", run:true},
    {say:"A frame like <code>ROWS BETWEEN 2 PRECEDING AND CURRENT ROW</code> makes a <b>3-row moving average</b>:", sql:"SELECT order_date, amount,\n  AVG(amount) OVER (ORDER BY order_date ROWS BETWEEN 2 PRECEDING AND CURRENT ROW) AS moving_avg\nFROM orders", new:"ROWS BETWEEN 2 PRECEDING AND CURRENT ROW", run:true},
    {say:"Your turn."}
  ],
  'dbt-model':[
    {say:"Capstone time. A dbt model is just a stack of CTEs that reads like a pipeline: <b>stage</b> the raw data → <b>transform</b>/join → <b>aggregate</b> → final select. Each CTE is one clear step."},
    {say:"A customer mart: clean the source, total per customer, then join so every customer appears (zeros for the quiet ones). Notice how each CTE has one job.", sql:"WITH stg_orders AS (\n  SELECT customer_id, amount FROM orders WHERE customer_id IS NOT NULL\n),\nper_customer AS (\n  SELECT customer_id, SUM(amount) AS total, COUNT(*) AS orders\n  FROM stg_orders GROUP BY customer_id\n)\nSELECT c.name,\n  COALESCE(p.total, 0)  AS lifetime_value,\n  COALESCE(p.orders, 0) AS order_count\nFROM customers c\nLEFT JOIN per_customer p ON c.id = p.customer_id\nORDER BY lifetime_value DESC", new:"stage → aggregate → join (a model!)", run:true},
    {say:"In real dbt this exact SQL lives in a <code>.sql</code> file; <code>FROM orders</code> becomes <code>FROM {{ ref('stg_orders') }}</code> and Jinja/macros add the templating. The <b>SQL</b> — the part you're learning — is identical. Your turn: build the model."}
  ]
});

    Q('cs:agegrp','case',3,'Life stage','For each customer show <b>name</b>, <b>age</b>, and a group: <b>senior</b> (50+), <b>adult</b> (30–49), else <b>young</b>.',"SELECT name, age, CASE WHEN age >= 50 THEN 'senior' WHEN age >= 30 THEN 'adult' ELSE 'young' END FROM customers",{...rq,hints:H}),

    Q('cs:region','case',4,'Region label','For each customer show <b>name</b>, <b>city</b>, and a region: <b>UK</b> for London, <b>US</b> for New York or Boston, <b>JP</b> for Tokyo, else <b>other</b>.',"SELECT name, city, CASE WHEN city = 'London' THEN 'UK' WHEN city IN ('New York','Boston') THEN 'US' WHEN city = 'Tokyo' THEN 'JP' ELSE 'other' END FROM customers",{...rq,hints:['You can test several values with <code>city IN (…)</code> inside a WHEN.','Helsinki falls through to the ELSE.']}),
    Q('cs:europe','case',3,'Continent','For each customer show <b>name</b>, <b>city</b>, and <b>Europe</b> for London or Helsinki, else <b>Elsewhere</b>.',"SELECT name, city, CASE WHEN city IN ('London','Helsinki') THEN 'Europe' ELSE 'Elsewhere' END FROM customers",{...rq,hints:H}),
    Q('cs:retflag','case',2,'Return flag','For every order show <b>id</b> and a flag that is <b>1</b> when status is returned, else <b>0</b>.',"SELECT id, CASE WHEN status = 'returned' THEN 1 ELSE 0 END FROM orders",{...rq,hints:H}),
    Q('cs:prodcat','case',3,'Big-ticket?','For every order show <b>product</b> and a category: <b>big-ticket</b> for Laptop or Monitor, else <b>accessory</b>.',"SELECT product, CASE WHEN product IN ('Laptop','Monitor') THEN 'big-ticket' ELSE 'accessory' END FROM orders",{...rq,hints:H}),
    Q('cs:expensive','case',2,'Expensive or cheap','For every order show <b>amount</b> and <b>expensive</b> when 100 or more, else <b>cheap</b>.',"SELECT amount, CASE WHEN amount >= 100 THEN 'expensive' ELSE 'cheap' END FROM orders",{...rq,hints:H}),

'coalesce':()=>{
  const rq={req:/\bcoalesce\b|\bifnull\b/i,reqMsg:'<code>COALESCE</code> (or <code>IFNULL</code>)'};
  const ON='ON customers.id = orders.customer_id';
  return [
    Q('co:status','coalesce',2,'Fill the gaps','For every order show <b>id</b> and its status — but replace missing (NULL) statuses with the text <b>unknown</b>.',"SELECT id, COALESCE(status, 'unknown') FROM orders",{...rq,hints:['<code>COALESCE(status, &#39;unknown&#39;)</code> returns status, or the fallback when status is NULL.','The orphan orders (107, 121) plus 116 have no status.']}),
    Q('co:statuspending','coalesce',2,'Default to pending','For every order show <b>id</b> and its status, defaulting missing values to <b>pending</b>.',"SELECT id, COALESCE(status, 'pending') FROM orders",{...rq,hints:['Same pattern, different fallback word.','<code>COALESCE(status, &#39;pending&#39;)</code>']}),
    Q('co:ifnull','coalesce',2,'IFNULL shorthand','Using <code>IFNULL</code>, show every order\'s <b>id</b> and status, defaulting missing values to <b>n/a</b>.',"SELECT id, IFNULL(status, 'n/a') FROM orders",{...rq,hints:['<code>IFNULL(x, y)</code> is the two-argument form of COALESCE.','<code>IFNULL(status, &#39;n/a&#39;)</code>']}),
    Q('co:custid','coalesce',2,'No customer = 0','For every order show <b>product</b> and its customer_id, but show <b>0</b> where the order has no customer.',"SELECT product, COALESCE(customer_id, 0) FROM orders",{...rq,hints:['The two orphan orders have a NULL customer_id.','<code>COALESCE(customer_id, 0)</code>']}),
    Q('co:leftprod','coalesce',3,'Everyone, with a fallback','Show <b>every</b> customer\'s <b>name</b> and product; for customers who never ordered show <b>no orders</b> instead of NULL. (LEFT JOIN.)',"SELECT customers.name, COALESCE(orders.product, 'no orders') FROM customers LEFT JOIN orders "+ON,{...rq,hints:['LEFT JOIN keeps the quiet customers; their orders.product is NULL.','Wrap it: <code>COALESCE(orders.product, &#39;no orders&#39;)</code>']}),
    Q('co:spend0','coalesce',4,'Spend, zero for quiet','For <b>every</b> customer show <b>name</b> and total spend — and <b>0</b> (not NULL) for those who never ordered.',"SELECT customers.name, COALESCE(SUM(orders.amount), 0) FROM customers LEFT JOIN orders "+ON+" GROUP BY customers.id",{...rq,hints:['LEFT JOIN + GROUP BY, then wrap the SUM.','<code>COALESCE(SUM(orders.amount), 0)</code>']}),
    Q('co:cnt0','coalesce',4,'Order count, zero-filled','For <b>every</b> customer show <b>name</b> and how many orders — <b>0</b> for the quiet ones. (Count orders.id so NULL rows count as 0; no COALESCE needed there — but use COALESCE on the total spend column too.)',"SELECT customers.name, COUNT(orders.id), COALESCE(SUM(orders.amount), 0) FROM customers LEFT JOIN orders "+ON+" GROUP BY customers.id",{...rq,hints:['<code>COUNT(orders.id)</code> already gives 0; <code>COALESCE(SUM(orders.amount),0)</code> fixes the spend.','LEFT JOIN + GROUP BY customers.id.']}),
    Q('co:lastdate','coalesce',4,'Last order or never','For <b>every</b> customer show <b>name</b> and their most recent order_date — or <b>never</b> if they have none.',"SELECT customers.name, COALESCE(MAX(orders.order_date), 'never') FROM customers LEFT JOIN orders "+ON+" GROUP BY customers.id",{...rq,hints:['MAX(order_date) is NULL for the quiet customers.','<code>COALESCE(MAX(orders.order_date), &#39;never&#39;)</code>']}),
    Q('co:groupclean','coalesce',3,'Count by clean status','Group orders by status (treating missing as <b>unknown</b>) and show each status with its count.',"SELECT COALESCE(status, 'unknown') AS s, COUNT(*) FROM orders GROUP BY s",{...rq,hints:['COALESCE first, then GROUP BY the cleaned value.','<code>GROUP BY COALESCE(status,&#39;unknown&#39;)</code> (or group by the alias).']}),
    Q('co:nullif','coalesce',3,'NULLIF basics','For every order show <b>id</b> and status, but turn <b>completed</b> into NULL using <code>NULLIF</code> (leave others as-is).',"SELECT id, NULLIF(status, 'completed') FROM orders",{req:/\bnullif\b/i,reqMsg:'<code>NULLIF</code>',hints:['<code>NULLIF(a, b)</code> returns NULL when a equals b, else a.','<code>NULLIF(status, &#39;completed&#39;)</code>']}),
    Q('co:nullifcity','coalesce',3,'Hide the capital','For each customer show <b>name</b> and city, but blank out (NULL) anyone in <b>London</b> using <code>NULLIF</code>.',"SELECT name, NULLIF(city, 'London') FROM customers",{req:/\bnullif\b/i,reqMsg:'<code>NULLIF</code>',hints:['<code>NULLIF(city, &#39;London&#39;)</code> → NULL for Londoners.','Others keep their city.']}),
    Q('co:findnull','coalesce',3,'Gaps via COALESCE','Show the <b>id</b> of orders whose status is missing, by testing <code>COALESCE(status,\'x\') = \'x\'</code>.',"SELECT id FROM orders WHERE COALESCE(status, 'x') = 'x'",{...rq,hints:['If status is NULL, COALESCE returns the sentinel &#39;x&#39;.','<code>WHERE COALESCE(status,&#39;x&#39;) = &#39;x&#39;</code> finds the NULLs.']}),
    Q('co:ifnullcid','coalesce',2,'IFNULL on id','Using <code>IFNULL</code>, show every order\'s <b>product</b> and customer_id, defaulting missing ids to <b>-1</b>.',"SELECT product, IFNULL(customer_id, -1) FROM orders",{...rq,hints:['<code>IFNULL(customer_id, -1)</code>.','Orphan orders show -1.']}),
    Q('co:spend0sort','coalesce',4,'Spend, sorted','For customers who have ordered, show <b>name</b> and total spend, highest first.',"SELECT customers.name, COALESCE(SUM(orders.amount), 0) AS spend FROM customers JOIN orders "+ON+" GROUP BY customers.id ORDER BY spend DESC",{...rq,ord:true,hints:['Same zero-fill, then ORDER BY the spend DESC.','Quiet customers (spend 0) sink to the bottom.']})
  ];
},
'subquery':()=>{
  const rq={req:/\(\s*select/i,reqMsg:'a subquery'};
  const buyers=p=>Q('sq:buy:'+p,'subquery',3,'Who bought it?',`Show the <b>name</b> of every customer who has ordered a <b>${p}</b> — using <code>WHERE id IN (SELECT …)</code>.`,`SELECT name FROM customers WHERE id IN (SELECT customer_id FROM orders WHERE product = '${p}')`,{...rq,hints:['The inner query lists the customer_ids who bought it; the outer keeps customers in that list.',`<code>WHERE id IN (SELECT customer_id FROM orders WHERE product='${p}')</code>`]});

  out.push(Q('sq:avgamt','subquery',3,'Above average','Show <b>product</b> and <b>amount</b> of orders that cost more than the <b>average</b> order. (Use a scalar subquery.)',"SELECT product, amount FROM orders WHERE amount > (SELECT AVG(amount) FROM orders)",{...rq,hints:['<code>(SELECT AVG(amount) FROM orders)</code> is one number you compare against.','<code>WHERE amount &gt; (SELECT AVG(amount) FROM orders)</code>']}));
  out.push(Q('sq:belowavg','subquery',3,'Below average','Show <b>product</b> and <b>amount</b> of orders cheaper than the average order.',"SELECT product, amount FROM orders WHERE amount < (SELECT AVG(amount) FROM orders)",{...rq,hints:['Same idea, flipped comparison.','<code>WHERE amount &lt; (SELECT AVG(amount) FROM orders)</code>']}));
  out.push(Q('sq:ageavg','subquery',3,'Older than average','Show <b>name</b> and <b>age</b> of customers older than the average customer age.',"SELECT name, age FROM customers WHERE age > (SELECT AVG(age) FROM customers)",{...rq,hints:['<code>(SELECT AVG(age) FROM customers)</code> as the comparison value.','<code>WHERE age &gt; (SELECT AVG(age) FROM customers)</code>']}));
  out.push(Q('sq:ageavgu','subquery',3,'Younger than average','Show <b>name</b> and <b>age</b> of customers younger than the average age.',"SELECT name, age FROM customers WHERE age < (SELECT AVG(age) FROM customers)",{...rq,hints:['Scalar subquery again.','<code>WHERE age &lt; (SELECT AVG(age) FROM customers)</code>']}));
  out.push(Q('sq:maxorder','subquery',3,'The single priciest','Show the <b>product</b> and <b>amount</b> of the most expensive order, by matching the max amount with a subquery.',"SELECT product, amount FROM orders WHERE amount = (SELECT MAX(amount) FROM orders)",{...rq,hints:['<code>WHERE amount = (SELECT MAX(amount) FROM orders)</code>.','Returns the top order without ORDER BY/LIMIT.']}));
  out.push(Q('sq:minorder','subquery',3,'The cheapest','Show the <b>product</b> and <b>amount</b> of the cheapest order via a subquery.',"SELECT product, amount FROM orders WHERE amount = (SELECT MIN(amount) FROM orders)",{...rq,hints:['<code>WHERE amount = (SELECT MIN(amount) FROM orders)</code>.','']}));
  out.push(Q('sq:notordered','subquery',4,'Never ordered','Show the <b>name</b> of customers who have <b>never</b> ordered — with <code>NOT IN</code>. ⚠️ Exclude NULLs inside the subquery or NOT IN returns nothing!',"SELECT name FROM customers WHERE id NOT IN (SELECT customer_id FROM orders WHERE customer_id IS NOT NULL)",{...rq,hints:['NOT IN with a NULL in the list returns no rows — guard it.','<code>WHERE id NOT IN (SELECT customer_id FROM orders WHERE customer_id IS NOT NULL)</code>']}));
  out.push(Q('sq:londonprods','subquery',4,'London basket','Show the <b>distinct products</b> bought by customers who live in <b>London</b> (subquery on the customers table).',"SELECT DISTINCT product FROM orders WHERE customer_id IN (SELECT id FROM customers WHERE city = 'London')",{...rq,hints:['Inner query lists London customer ids; outer filters orders to them.',"<code>WHERE customer_id IN (SELECT id FROM customers WHERE city='London')</code>"]}));
  out.push(Q('sq:tokyoprods','subquery',4,'Tokyo basket','Show the <b>distinct products</b> bought by customers in <b>Tokyo</b>.',"SELECT DISTINCT product FROM orders WHERE customer_id IN (SELECT id FROM customers WHERE city = 'Tokyo')",{...rq,hints:['Same shape, different city.',"<code>IN (SELECT id FROM customers WHERE city='Tokyo')</code>"]}));
  out.push(Q('sq:derived_avgcnt','subquery',5,'Average orders per buyer','Using a derived table, return the <b>average number of orders per customer</b> (count among customers who have ordered).',"SELECT AVG(c) FROM (SELECT customer_id, COUNT(*) AS c FROM orders WHERE customer_id IS NOT NULL GROUP BY customer_id)",{...rq,hints:['First build per-customer counts in a subquery in FROM, then average them.','<code>SELECT AVG(c) FROM (SELECT customer_id, COUNT(*) c FROM orders WHERE customer_id IS NOT NULL GROUP BY customer_id)</code>']}));
  out.push(Q('sq:derived_maxtot','subquery',5,'Biggest customer total','Using a derived table of per-customer totals, return the single <b>largest</b> total spend.',"SELECT MAX(t) FROM (SELECT customer_id, SUM(amount) AS t FROM orders GROUP BY customer_id)",{...rq,hints:['Per-customer totals in a FROM-subquery, then MAX over them.','<code>SELECT MAX(t) FROM (SELECT customer_id, SUM(amount) t FROM orders GROUP BY customer_id)</code>']}));
  out.push(Q('sq:corr_freq','subquery',5,'Frequent buyers (correlated)','Show the <b>name</b> of customers with more than 2 orders, using a correlated subquery that counts each customer\'s orders.',"SELECT name FROM customers c WHERE (SELECT COUNT(*) FROM orders o WHERE o.customer_id = c.id) > 2",{...rq,hints:['The inner COUNT references the outer row (<code>o.customer_id = c.id</code>) — that&#39;s "correlated".','<code>WHERE (SELECT COUNT(*) FROM orders o WHERE o.customer_id = c.id) &gt; 2</code>']}));
  return out;
},
'cte':()=>{
  const rq={req:/\bwith\b/i,reqMsg:'a <code>WITH</code> (CTE)'};
  const ON='ON customers.id = orders.customer_id';
  const out=[];
  out.push(Q('ct:big','cte',3,'Name a step','Using a CTE called <code>big_orders</code> (orders over 100), show the <b>product</b> and <b>amount</b> from it.',"WITH big_orders AS (SELECT * FROM orders WHERE amount > 100) SELECT product, amount FROM big_orders",{...rq,hints:['<code>WITH big_orders AS (SELECT * FROM orders WHERE amount &gt; 100) SELECT …</code>','Select product, amount from the CTE.']}));
  out.push(Q('ct:cheap','cte',3,'Cheap step','Using a CTE of orders under 50, show their <b>product</b> and <b>amount</b>.',"WITH cheap AS (SELECT * FROM orders WHERE amount < 50) SELECT product, amount FROM cheap",{...rq,hints:['<code>WITH cheap AS (SELECT * FROM orders WHERE amount &lt; 50) …</code>','']}));
  [['ct:tot300',300],['ct:tot200',200],['ct:tot500',500]].forEach(([id,t])=>
    out.push(Q(id,'cte',4,'Big spenders via CTE',`Build a CTE of <b>total spend per customer</b>, then show the customer_id and total for those spending more than ${t}.`,`WITH per_customer AS (SELECT customer_id, SUM(amount) AS total FROM orders GROUP BY customer_id) SELECT customer_id, total FROM per_customer WHERE total > ${t}`,{...rq,hints:['Sum per customer in the CTE, then filter the CTE.',`<code>WITH per_customer AS (… GROUP BY customer_id) SELECT … WHERE total &gt; ${t}</code>`]})));

Object.assign(FAMILIES,{

    Q('dd:latest','dedup',5,'Latest order per customer','Show one row per customer: their <b>customer_id</b>, <b>product</b> and <b>order_date</b> of their most recent order.',wrap('customer_id, product, order_date','customer_id','order_date DESC','customer_id IS NOT NULL'),{...rq,hints:H}),

    Q('dd:cheapestperprod','dedup',5,'Cheapest sale per product','Show one row per product: <b>product</b> and the lowest <b>amount</b> it ever sold for.',wrap('product, amount','product','amount ASC',null),{...rq,hints:['Partition by product, order by amount ASC.',H[1]]}),
    Q('dd:latestdateonly','dedup',5,'Each customer&#39;s last order date','Show each customer&#39;s <b>customer_id</b> and the <b>order_date</b> of their latest order (one row each).',wrap('customer_id, order_date','customer_id','order_date DESC','customer_id IS NOT NULL'),{...rq,hints:H}),
    Q('dd:dearestperprod','dedup',5,'Top sale per product','Show one row per product: <b>product</b>, <b>customer_id</b>, <b>amount</b> of its most expensive sale.',wrap('product, customer_id, amount','product','amount DESC',null),{...rq,hints:['Partition by product, order by amount DESC.',H[1]]}),

/* ---------------- Persistent state (v3) — per-track progress ---------------- */
const SAVE_KEY='querious.v3';
const PROGRESS_FIELDS=['tick','focus','lastQid','totalSolved','mastery','solved','servedAt','tutsSeen','cleanStreak','struggleStreak','skipOffered','finished'];
function defaultProgress(){return {tick:0,focus:null,lastQid:null,totalSolved:0,mastery:{},solved:{},servedAt:{},tutsSeen:{},cleanStreak:0,struggleStreak:0,skipOffered:false,finished:false};}
let state=load();
function load(){
  let saved=null; try{ saved=JSON.parse(localStorage.getItem(SAVE_KEY)); }catch(e){}
  if(saved&&saved.v===3){
    const at=saved.allTracks||{};
    at.sql=Object.assign(defaultProgress(),at.sql||{});
    at.python=Object.assign(defaultProgress(),at.python||{});
    at.pandas=Object.assign(defaultProgress(),at.pandas||{});
    const validTrack=(saved.track==='python'||saved.track==='pandas')?saved.track:'sql';
    const st={v:3,track:validTrack,seenIntro:!!saved.seenIntro,seenPyIntro:!!saved.seenPyIntro,seenPdIntro:!!saved.seenPdIntro,allTracks:at};
    Object.assign(st,st.allTracks[st.track]);
    return st;
  }
  // fresh, or migrate v2 (flat, SQL-only) → SQL track progress
  let migrated=false; const sqlProg=defaultProgress();
  try{
    const v2=JSON.parse(localStorage.getItem('querious.v2'));
    if(v2&&v2.v===2){ PROGRESS_FIELDS.forEach(f=>{ if(v2[f]!==undefined) sqlProg[f]=v2[f]; }); migrated=true; }
  }catch(e){}
  const st={v:3,track:'sql',seenIntro:migrated,seenPyIntro:false,seenPdIntro:false,allTracks:{sql:sqlProg,python:defaultProgress(),pandas:defaultProgress()}};
  Object.assign(st,st.allTracks.sql);
  return st;
}
function syncFlat(){ const p=state.allTracks[state.track]; PROGRESS_FIELDS.forEach(f=>{ p[f]=state[f]; }); }
function save(){ try{ syncFlat(); localStorage.setItem(SAVE_KEY,JSON.stringify({v:3,track:state.track,seenIntro:state.seenIntro,seenPyIntro:state.seenPyIntro,seenPdIntro:state.seenPdIntro,allTracks:state.allTracks})); }catch(e){} }
function activateTrack(t){
  if(state.track!==t) syncFlat();
  state.track=t;
  if(!state.allTracks[t]) state.allTracks[t]=defaultProgress();
  PROGRESS_FIELDS.forEach(f=>{ state[f]=state.allTracks[t][f]; });
  const T=TRACKS[t];
  CONCEPT_ORDER=T.concepts; CONCEPT_META=T.meta; PREREQ=T.prereq; QUOTA=T.quota;
  TUTORIALS=T.tutorials; QUESTIONS=T.questions; QBYID=T.byId; QBYCONCEPT=T.byConcept; DIVIDER=T.divider;
  lastConcept=null; lastConceptRun=0;
  document.getElementById('prog-total').textContent=QUESTIONS.length;
  save();
}

/* ---------------- Learner model ---------------- */
function mstat(cid){return state.mastery[cid]||(state.mastery[cid]={m:0,n:0,last:0});}
function mastery(cid){return mstat(cid).m;}
function unlocked(cid){return PREREQ[cid].every(p=>{const s=mstat(p);return s.m>=0.45||s.n>=2;});}
function unlockedList(){return CONCEPT_ORDER.filter(unlocked);}
function skillPct(){const t=CONCEPT_ORDER.reduce((a,c)=>a+mastery(c),0);return Math.round(t/CONCEPT_ORDER.length*100);}
function updateMastery(cid,score,alpha){
  const s=mstat(cid); alpha=alpha==null?0.3:alpha;
  s.m=Math.max(0,Math.min(1,s.m+alpha*(score-s.m))); s.n++; s.last=state.tick;
}
function qualityOf(T){
  if(T.revealed)return 0.15;
  if(T.hints>=2)return 0.5;
  if(T.hints===1)return 0.68;
  let q=(T.attempts<=1&&T.errors===0)?1:0.85;
  return Math.max(0.3,q-0.05*Math.min(T.errors,3));
}

/* ---------------- Question selection ---------------- */
let lastConcept=null,lastConceptRun=0;
function remainingUnsolved(cid){return QBYCONCEPT[cid].filter(q=>!state.solved[q.id]).length;}
function pickFrom(cid){
  const m=mastery(cid);
  const target=m<0.35?1:m<0.55?2:m<0.72?3:m<0.86?4:5;
  let pool=QBYCONCEPT[cid].filter(q=>!state.solved[q.id]);
  if(!pool.length) pool=[...QBYCONCEPT[cid]].sort((a,b)=>(state.servedAt[a.id]||0)-(state.servedAt[b.id]||0)).slice(0,6);
  pool=[...pool].sort((a,b)=>{
    const da=Math.abs(a.level-target),dbb=Math.abs(b.level-target);
    if(da!==dbb)return da-dbb;
    return (state.servedAt[a.id]||0)-(state.servedAt[b.id]||0);
  });
  const top=pool.slice(0,Math.min(3,pool.length));
  return top[Math.floor(Math.random()*top.length)];
}
function pickNextQuestion(){
  if(state.focus&&unlocked(state.focus))return pickFrom(state.focus);
  const ul=unlockedList();
  const fresh=ul.find(c=>mstat(c).n===0);                  // introduce the next new skill, in course order
  if(fresh&&Math.random()<0.6)return pickFrom(fresh);
  let cands=ul.filter(c=>remainingUnsolved(c)>0); if(!cands.length)cands=ul;
  const weights=cands.map(c=>{
    let w=Math.pow(1-mastery(c),2)+0.15;
    if(mstat(c).n===0)w+=0.35;                             // gentle pull toward unexplored skills
    if(c===lastConcept&&lastConceptRun>=2)w*=0.2;          // vary the diet
    return w;
  });
  let r=Math.random()*weights.reduce((a,b)=>a+b,0);
  for(let i=0;i<cands.length;i++){r-=weights[i];if(r<=0)return pickFrom(cands[i]);}
  return pickFrom(cands[cands.length-1]);
}
function weakestSkill(){
  const seen=unlockedList().filter(c=>mstat(c).n>0);
  if(!seen.length)return null;
  return seen.sort((a,b)=>mastery(a)-mastery(b))[0];
}

/* ---------------- Ability meter ---------------- */
const LEVELS=[{min:0,name:'Novice'},{min:25,name:'Learning'},{min:48,name:'Confident'},{min:68,name:'Sharp'},{min:86,name:'Fluent'}];
function levelFor(p){let cur=LEVELS[0],n=1;LEVELS.forEach((l,i)=>{if(p>=l.min){cur=l;n=i+1;}});return{name:cur.name,n};}
function refreshAbility(){
  const p=skillPct(),lv=levelFor(p);
  document.getElementById('lvl-name').textContent=lv.name;
  document.getElementById('lvl-sub').textContent='· level '+lv.n;
  document.getElementById('meter-fill').style.width=Math.max(4,p)+'%';
  document.getElementById('prog-done').textContent=state.totalSolved;
}

   PYTHON RUNTIME (Pyodide) — lazy-loaded when the Python track opens
   ============================================================ */
let pyodide=null, pyodideLoading=null;
const PY_HARNESS = `
import io, contextlib, json
def _canon(v):
    if isinstance(v, dict):
        return '{' + ', '.join(repr(k) + ': ' + _canon(v[k]) for k in sorted(v, key=lambda x: repr(x))) + '}'
    if isinstance(v, list):
        return '[' + ', '.join(_canon(x) for x in v) + ']'
    if isinstance(v, tuple):
        return '(' + ', '.join(_canon(x) for x in v) + ')'
    if isinstance(v, set):
        return '{' + ', '.join(sorted(_canon(x) for x in v)) + '}'
    return repr(v)
def _qrun(code, kind, meta):
    ns = {}
    buf = io.StringIO()
    try:
        with contextlib.redirect_stdout(buf):
            if kind == 'expr':
                return json.dumps({'ok':True,'val':_canon(eval(code, ns)),'out':buf.getvalue()})
            exec(code, ns)
            if kind == 'var':
                return json.dumps({'ok':True,'val':_canon(ns.get(meta['var'])),'out':buf.getvalue()})
            if kind == 'func':
                f = ns.get(meta['fn'])
                if not callable(f):
                    return json.dumps({'ok':False,'err':'Define a function called ' + meta['fn'] + '(...)'})
                vals = [_canon(f(*c)) for c in meta['cases']]
                return json.dumps({'ok':True,'vals':vals,'out':buf.getvalue()})
            return json.dumps({'ok':True,'out':buf.getvalue()})
    except Exception as e:
        return json.dumps({'ok':False,'err':type(e).__name__ + ': ' + str(e),'out':buf.getvalue()})
`;
function pyReady(){return !!pyodide;}
function ensurePyodide(){
  if(pyodide)return Promise.resolve(pyodide);
  if(pyodideLoading)return pyodideLoading;
  pyodideLoading=(async()=>{
    if(typeof loadPyodide==='undefined')throw new Error('Pyodide loader not available');
    const py=await loadPyodide({indexURL:'https://cdn.jsdelivr.net/pyodide/v0.26.4/full/'});
    py.runPython(PY_HARNESS);
    pyodide=py; return py;
  })();
  return pyodideLoading;
}
function showPyLoading(label){
  label=label||'Python';
  const o=document.getElementById('overlay');
  document.getElementById('spinner').style.display='';
  document.getElementById('ov-title').textContent='Loading '+label+'…';

    ? 'Loading Python + the pandas library (first time only — a ~20&nbsp;MB download). Then it runs instantly.'
    : 'Fetching a real Python runtime (Pyodide). First time only — about 10&nbsp;MB — then it runs instantly.';
  o.style.display='grid';
}
function hidePyLoading(){document.getElementById('overlay').style.display='none';}
function pyLoadError(){
  document.getElementById('spinner').style.display='none';
  document.getElementById('ov-title').textContent='Couldn’t load Python';
  document.getElementById('ov-msg').innerHTML='The Python runtime needs an internet connection. Check your connection, then click the Python tab again.';
}
function runOne(code,q){
  try{
    pyodide.globals.set('_code',code);
    pyodide.globals.set('_kind',q.kind||'print');
    pyodide.globals.set('_meta',JSON.stringify({var:q.varname||'result',fn:q.fname||'f',cases:q.cases||[]}));
    return JSON.parse(pyodide.runPython('_qrun(_code,_kind,json.loads(_meta))'));
  }catch(e){return {ok:false,err:String((e&&e.message)||e)};}
}
function pyOut(text){const w=document.createElement('div');w.className='result-scroll';const pre=document.createElement('pre');pre.className='pyout';pre.textContent=text;w.appendChild(pre);return w;}
function pyResultNode(chk){
  const parts=[];
  if(chk.out)parts.push(chk.out.replace(/\n+$/,''));
  if(chk.val!==undefined&&chk.val!==null)parts.push('→ '+chk.val);
  if(chk.vals)parts.push('→ '+chk.vals.join(',  '));
  return pyOut(parts.length?parts.join('\n'):'(ran — no output)');
}
function checkPython(q,code){
  if(q.requires&&!q.requires.test(code))return {ok:false,msg:'This one is practising '+q.reqMsg+' — make sure your code uses it.'};
  const got=runOne(code,q);
  if(!got.ok)return {error:got.err||'error',out:got.out};
  const want=runOne(q.solution,q);
  if(q.kind==='print'){
    const a=(got.out||'').replace(/\s+$/,''),b=(want.out||'').replace(/\s+$/,'');
    return a===b?{ok:true,out:got.out}:{ok:false,msg:'Your printed output doesn’t match yet.',out:got.out};
  }
  if(q.kind==='func'){
    const g=got.vals||[],w=want.vals||[];let bad=-1;
    for(let i=0;i<w.length;i++){if(g[i]!==w[i]){bad=i;break;}}
    if(bad<0&&g.length===w.length)return {ok:true,vals:g,out:got.out};
    const c=(q.cases&&q.cases[bad])||[];
    const call='f('+c.map(x=>JSON.stringify(x)).join(', ')+')';
    return {ok:false,msg:'For <code>'+escapeText(call)+'</code> your code gave <code>'+escapeText(String(g[bad]))+'</code>, but it should give <code>'+escapeText(String(w[bad]))+'</code>.',out:got.out};
  }
  return got.val===want.val?{ok:true,val:got.val,out:got.out}:{ok:false,msg:'Not the expected value — your code produced <code>'+escapeText(String(got.val))+'</code>.',out:got.out};
}
function runPython(){
  const q=view==='q'?CURQ:null;
  const code=taEl.value;
  const resBox=document.getElementById('result');
  if(!code.trim()){resBox.innerHTML='';banner('warn','✏️','Write some code first, then hit Run.');return;}
  if(view==='sandbox'){
    const r=runOne(code,{kind:'print'});
    resBox.innerHTML='';
    if(!r.ok){banner('err','⚠️','<b>Python error:</b> '+escapeText(r.err||'error'));if(r.out)resBox.appendChild(pyOut(r.out));}
    else{banner('ok','✓','Ran.');resBox.appendChild(pyOut((r.out&&r.out.replace(/\n+$/,''))||'(no output — use print() to see values)'));}
    return;
  }
  T.attempts++;
  const chk=checkPython(q,code);
  resBox.innerHTML='';
  if(chk.error!==undefined){
    T.errors++;
    banner('err','⚠️','<b>Python error:</b> '+escapeText(chk.error));
    if(chk.out)resBox.appendChild(pyOut(chk.out));
    if(T.errors>=2){document.getElementById('reveal-btn').style.display='inline-block';if(hintsShown===0)showNextHint(true);}
    return;
  }
  if(chk.ok){ complete(q, pyResultNode(chk)); }
  else{
    banner('err','✗','<b>Not quite.</b> '+chk.msg);
    if(chk.out)resBox.appendChild(pyOut(chk.out));
    if(T.attempts>=2||T.errors>=2)document.getElementById('reveal-btn').style.display='inline-block';
    if(T.attempts>=2&&hintsShown===0)showToast('💡 Tip: tap <b>Hint</b> for a nudge — one clue at a time.',null,4000);
  }
}
async function __pyBankTest(){

def _num(x):
    try:
        x = x.item()

        pass

def _pcanon(v, ordered):

    if isinstance(v, pd.Series):

        if not ordered:

        return 'S\\n' + '\\n'.join(vals)

        return repr([_num(x) for x in v])

/* Plain-English diagnosis of what's actually wrong with the user's SQL,
   so an error reads like a tutor, not a parser. Returns a string or null. */
function diagnose(sql,errMsg,q){
  const s=(sql||'').trim();if(!s)return null;
  const low=s.toLowerCase();
  const selIdx=low.search(/\bselect\b/);
  const fromIdx=low.search(/\bfrom\b/);
  // clause order — the classic "FROM ... SELECT ..."
  if(fromIdx>=0&&selIdx>=0&&fromIdx<selIdx)
    return 'Clause order matters in SQL: <code>SELECT</code> (the columns) comes <b>first</b>, then <code>FROM</code> (the table). Re-order it to <code>SELECT … FROM …</code>.';
  if(selIdx<0&&fromIdx>=0)
    return 'Every query has to start with <code>SELECT</code>. Add it before your column list.';
  if(selIdx>=0&&fromIdx<0&&!/\bfrom\b/.test(low))
    return 'You’ve chosen columns but not said <i>from which table</i> — add <code>FROM customers</code> or <code>FROM orders</code>.';
  if(errMsg){
    let m=errMsg.match(/no such column:\s*([^\s)]+)/i);
    if(m){
      const col=m[1];
      if(/^[A-Za-z]/.test(col)&&!col.includes('.'))
        return `The database is reading <code>${escapeText(col)}</code> as a column name. If you meant it as a <b>text value</b>, wrap it in single quotes: <code>'${escapeText(col)}'</code>. Otherwise check the spelling against the table headers below.`;
      return `There’s no column called <code>${escapeText(col)}</code> — check the spelling against the headers in the tables below.`;
    }
    m=errMsg.match(/no such table:\s*([^\s)]+)/i);
    if(m)return `There’s no table called <code>${escapeText(m[1])}</code> — the only two tables are <code>customers</code> and <code>orders</code>.`;
    if((s.split("'").length-1)%2===1)
      return 'A quote looks unbalanced — text values need a matching <b>pair</b> of single quotes, like <code>\'London\'</code>.';
    if(/\bgroup\b(?!\s+by)/i.test(low))
      return 'It’s two words: <code>GROUP BY</code> (not just GROUP).';
    if(/\border\b(?!\s+by)/i.test(low))
      return 'It’s two words: <code>ORDER BY</code> (not just ORDER).';
  }
  // valid-but-wrong: nudge toward the skill this question practises
  if(!errMsg&&q&&q.requires&&!q.requires.test(s)&&q.reqMsg)
    return `This question is practising ${q.reqMsg} — make sure your query uses it.`;
  return null;
}

function runSolution(q){try{const o=db.exec(q.solution);return o.length?o[o.length-1]:null;}catch(e){return null;}}
function normRows(result){
  if(!result)return[];
  return result.values.map(r=>r.map(v=>{
    if(v===null||v===undefined)return' NULL';
    if(typeof v==='number')return String(Math.round(v*1e6)/1e6);
    return String(v);
  }));
}
function checkAnswer(q,userResult){
  if(q.requires&&!q.requires.test(taEl.value)){
    return{ok:false,msg:`Your result may be close, but this question is practising ${q.reqMsg} — make sure your query uses it.`};
  }
  const sol=runSolution(q);
  const want=normRows(sol),got=normRows(userResult);
  if(got.length===0&&want.length>0)return{ok:false,msg:`Your query returned <b>no rows</b>; the goal expects <b>${want.length}</b>.`};
  const wantCols=sol?sol.columns.length:0,gotCols=userResult?userResult.columns.length:0;
  if(gotCols!==wantCols)return{ok:false,msg:`You returned <b>${gotCols}</b> column(s); the goal expects <b>${wantCols}</b>. Re-read which columns the task asks for.`};
  if(q.orderMatters){
    const same=got.length===want.length&&got.every((r,i)=>JSON.stringify(r)===JSON.stringify(want[i]));
    if(same)return{ok:true};
    if(sameMultiset(got,want))return{ok:false,msg:`Right rows, <b>wrong order</b> — check your <code>ORDER BY</code> (and its direction).`};
    return{ok:false,msg:rowCountMsg(got,want)};
  }
  if(sameMultiset(got,want))return{ok:true};
  return{ok:false,msg:rowCountMsg(got,want)};
}
function sameMultiset(a,b){
  if(a.length!==b.length)return false;
  const sa=a.map(r=>JSON.stringify(r)).sort(),sb=b.map(r=>JSON.stringify(r)).sort();
  return sa.every((v,i)=>v===sb[i]);
}
function rowCountMsg(got,want){
  if(got.length!==want.length)return`You returned <b>${got.length}</b> row(s); the goal has <b>${want.length}</b>. ${got.length>want.length?'Too many — tighten your filter or join.':'Too few — are you dropping rows you should keep?'}`;
  return`Right shape, but some <b>values differ</b> from what's expected.`;
}

const KEYWORDS=['select','from','where','and','or','not','null','is','in','like','between','order','by','group','having','limit','offset','as','on','using','join','inner','left','right','full','outer','cross','union','all','distinct','asc','desc','case','when','then','else','end','exists'];
const FUNCS=['count','sum','avg','min','max','round','upper','lower','length','coalesce','abs','ifnull'];
const HL_RE=new RegExp('(--[^\\n]*)'+'|'+"('(?:[^']|'')*')"+'|'+'(\\b\\d+(?:\\.\\d+)?\\b)'+'|'+'\\b('+KEYWORDS.join('|')+')\\b'+'|'+'\\b('+FUNCS.join('|')+')\\b','gi');
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escapeText(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function highlight(escaped){
  return escaped.replace(HL_RE,(m,c,s,n,kw,fn)=>{
    if(c)return`<span class="t-com">${c}</span>`;
    if(s)return`<span class="t-str">${s}</span>`;
    if(n)return`<span class="t-num">${n}</span>`;
    if(kw)return`<span class="t-kw">${m}</span>`;
    if(fn)return`<span class="t-fn">${m}</span>`;
    return m;
  });
}

function applyHighlightsFor(sql){
  clearHighlights();
  if(!sql||!sql.trim()){unionVizKeys();return;}
  const alias={customers:'customers',orders:'orders'};
  const aliasRe=/\b(?:from|join)\s+([a-z_]\w*)(?:\s+(?:as\s+)?([a-z_]\w*))?/ig;
  let m;
  while((m=aliasRe.exec(sql))){
    const tbl=m[1].toLowerCase();
    if(!COLUMNS[tbl])continue;
    if(m[2]){const a=m[2].toLowerCase();if(!isKeyword(a))alias[a]=tbl;}
  }
  const refRe=/\b([a-z_]\w*)\.([a-z_]\w*)/ig;
  while((m=refRe.exec(sql))){
    const t=alias[m[1].toLowerCase()];const c=m[2].toLowerCase();
    if(t&&COLUMNS[t]&&COLUMNS[t].includes(c))highlightCol(t,c,'col-ref');
  }
  const tablesInUse=[...new Set([...sql.matchAll(/\b(?:from|join)\s+([a-z_]\w*)/ig)].map(x=>x[1].toLowerCase()).filter(t=>COLUMNS[t]))];
  if(/(?<![\w.(])\*/.test(sql)){
    tablesInUse.forEach(t=>COLUMNS[t].forEach(c=>highlightCol(t,c,'col-ref')));
  }
  const starRe=/\b([a-z_]\w*)\.\*/ig;let sm;
  while((sm=starRe.exec(sql))){
    const t=alias[sm[1].toLowerCase()];
    if(t&&COLUMNS[t])COLUMNS[t].forEach(c=>highlightCol(t,c,'col-ref'));
  }
  if(tablesInUse.length===1){
    const t=tablesInUse[0];
    COLUMNS[t].forEach(c=>{
      const re=new RegExp('(?<![\\w.])'+c+'(?![\\w])','i');
      if(re.test(sql))highlightCol(t,c,'col-ref');
    });
  }
  const onRe=/\bon\b([\s\S]*?)(?:\bwhere\b|\bgroup\b|\border\b|\blimit\b|\bhaving\b|$)/i;
  const onM=sql.match(onRe);
  if(onM){
    const seg=onM[1];
    const kr=/\b([a-z_]\w*)\.([a-z_]\w*)/ig;let k;
    while((k=kr.exec(seg))){
      const t=alias[k[1].toLowerCase()];const c=k[2].toLowerCase();
      if(t&&COLUMNS[t]&&COLUMNS[t].includes(c)){highlightCol(t,c,'col-key');}
    }
  }
  applyRowHighlights(sql,alias,tablesInUse);
  unionVizKeys();
}
/* Evaluate which ROWS of each table survive the query, and fade the rest.
   Probes the live engine with a rewritten "SELECT id …" version of the query;
   if the rewrite isn't valid SQL (exotic shapes), we silently skip. */
function applyRowHighlights(sql,alias,tablesInUse){
  if(!db||!tablesInUse.length)return;
  if(/\bwith\b|\bover\s*\(|\bunion\b|\bexcept\b|\bintersect\b/i.test(sql))return;  // CTE/window/set-op shapes: too complex to probe reliably
  if(!/\bwhere\b|\blimit\b|\bjoin\b/i.test(sql))return;   // nothing filters rows → no dimming
  const hasGroup=/\bgroup\s+by\b/i.test(sql);
  const joined=tablesInUse.length>1||/\bjoin\b/i.test(sql);
  tablesInUse.forEach(t=>{
    let probe;
    if(!joined){
      let tail=sql.replace(/^[\s\S]*?\bfrom\b\s+[a-z_]\w*/i,'');
      if(hasGroup)tail=tail.replace(/\bgroup\s+by\b[\s\S]*$/i,'');  // membership = rows fed into the grouping
      probe='SELECT id FROM '+t+' '+tail;
    }else{
      let body=sql.replace(/^\s*select\b[\s\S]*?\bfrom\b/i,'FROM');
      body=body.replace(/\bgroup\s+by\b[\s\S]*$/i,'');
      body=body.replace(/\border\s+by\b[\s\S]*$/i,'');
      probe='SELECT DISTINCT '+t+'.id '+body;
    }
    probe=probe.replace(/;\s*$/,'');
    let ids;
    try{
      const o=db.exec(probe);
      ids=new Set((o.length?o[o.length-1].values:[]).map(r=>r[0]));
    }catch(e){return;}
    document.querySelectorAll('tr[data-rid^="'+t+'."]').forEach(tr=>{
      const id=Number(tr.dataset.rid.split('.')[1]);
      tr.classList.add(ids.has(id)?'row-hit':'row-miss');
    });
  });
}
function isKeyword(w){return KEYWORDS.includes(w)||FUNCS.includes(w);}

/* ---------------- Result table ---------------- */
function renderTable(result){
  const wrap=document.createElement('div');wrap.className='result-scroll';
  const meta=document.createElement('div');meta.className='result-meta';
  meta.textContent=`${result.values.length} row(s) × ${result.columns.length} column(s)`;
  const t=document.createElement('table');t.className='data';
  t.innerHTML='<thead><tr>'+result.columns.map(c=>`<th>${escapeText(c)}</th>`).join('')+'</tr></thead>';
  const tb=document.createElement('tbody');
  result.values.forEach(r=>{
    const tr=document.createElement('tr');
    tr.innerHTML=r.map(v=>{const isNull=v===null||v===undefined;return`<td class="${isNull?'null':''}">${isNull?'NULL':escapeText(String(v))}</td>`;}).join('');
    tb.appendChild(tr);
  });
  t.appendChild(tb);
  const holder=document.createElement('div');
  holder.appendChild(meta);wrap.appendChild(t);holder.appendChild(wrap);
  return holder;
}

let currentJoinType=null;
function initJoinViz(){
  document.querySelectorAll('#join-chips .chip').forEach(ch=>{ch.onclick=()=>selectJoin(ch.dataset.jt);});
  document.getElementById('viz-insert').onclick=()=>{
    if(!currentJoinType)return;
    const ed=document.getElementById('sql');if(!ed)return;
    taEl=ed;
    const kw={inner:'JOIN',left:'LEFT JOIN',right:'RIGHT JOIN',full:'FULL JOIN'}[currentJoinType];
    taEl.value=`SELECT customers.name, orders.product\nFROM customers\n${kw} orders ON customers.id = orders.customer_id`;
    paint();analyzeSql();taEl.focus();
  };
  const pre=CURQ?(CONCEPT_META[CURQ.concept].join||'inner'):'inner';
  selectJoin(pre);
}
function selectJoin(jt){
  currentJoinType=jt;
  document.querySelectorAll('#join-chips .chip').forEach(c=>c.classList.toggle('active',c.dataset.jt===jt));
  const info=JOIN_INFO[jt];
  ['leftonly','overlap','rightonly'].forEach(r=>{
    document.getElementById('r-'+r).classList.toggle('on',info.regions.includes(r));
  });
  document.getElementById('viz-explain').innerHTML=`<b>${info.title}</b> — ${info.text}`;
  const ib=document.getElementById('viz-insert');
  if(ib)ib.style.display=document.getElementById('sql')?'inline-block':'none';
  if(document.getElementById('sql')){
    clearHighlights();hlKeys();
    debouncedAnalyze();
  }else{
    applyHighlightsFor(curTutSql||'');
  }
}

function celebrate(){
  const cv=document.getElementById('confetti'),ctx=cv.getContext('2d');
  cv.width=innerWidth;cv.height=innerHeight;
  const colors=['#7c5cff','#22d3ee','#34d399','#fbbf24','#fb7185','#ffffff'];
  const N=140,parts=[];
  for(let i=0;i<N;i++){
    parts.push({x:innerWidth/2+(Math.random()-0.5)*160,y:innerHeight*0.32,vx:(Math.random()-0.5)*11,vy:Math.random()*-13-4,g:0.32+Math.random()*0.12,s:5+Math.random()*7,rot:Math.random()*6.28,vr:(Math.random()-0.5)*0.4,c:colors[(Math.random()*colors.length)|0]});
  }
  let frames=0;
  (function tick(){
    frames++;
    ctx.clearRect(0,0,cv.width,cv.height);
    parts.forEach(p=>{
      p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.globalAlpha=Math.max(0,1-frames/120);
      ctx.fillStyle=p.c;ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6);
      ctx.restore();
    });
    if(frames<120)requestAnimationFrame(tick);else ctx.clearRect(0,0,cv.width,cv.height);
  })();
}

/* ---------------- Dev self-test ---------------- */
window.__bankTest=function(){
  const perConcept={};let bad=[];
  QUESTIONS.forEach(q=>{
    perConcept[q.concept]=(perConcept[q.concept]||0)+1;
    try{
      const r=db.exec(q.solution);
      const rows=r.length?r[r.length-1].values.length:0;
      if(rows===0)bad.push({id:q.id,err:'EMPTY RESULT'});
      if(q.requires&&!q.requires.test(q.solution))bad.push({id:q.id,err:'REQUIRES FAILS OWN SOLUTION'});
    }catch(e){bad.push({id:q.id,err:e.message});}
  });
  return{total:QUESTIONS.length,perConcept,bad};
};
