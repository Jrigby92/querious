<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Querious — learn SQL by doing</title>
<script src="https://cdn.jsdelivr.net/npm/sql.js@1.12.0/dist/sql-wasm.js"></script>
<style>
  :root{
    --bg:#0a0b14;
    --bg2:#0e1020;
    --panel:rgba(22,24,40,0.66);
    --panel-solid:#13152a;
    --stroke:rgba(255,255,255,0.08);
    --stroke-strong:rgba(255,255,255,0.16);
    --text:#e8eaf6;
    --muted:#9aa0bf;
    --faint:#6b7299;
    --accent:#7c5cff;
    --accent2:#22d3ee;
    --good:#34d399;
    --bad:#fb7185;
    --warn:#fbbf24;
    --key:#22d3ee;
    --ref:#34d399;
    --radius:16px;
    --mono:ui-monospace,"SF Mono",Menlo,Monaco,"Cascadia Code",Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{min-height:100%}
  body{
    margin:0;font-family:var(--sans);color:var(--text);
    background:
      radial-gradient(1100px 700px at 12% -8%, rgba(124,92,255,0.18), transparent 60%),
      radial-gradient(900px 600px at 100% 0%, rgba(34,211,238,0.12), transparent 55%),
      linear-gradient(180deg,var(--bg),var(--bg2));
    background-attachment:fixed;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:rgba(124,92,255,0.35)}
  a{color:var(--accent2);text-decoration:none}
  a:hover{text-decoration:underline}

  /* ---------- Top bar ---------- */
  header{
    position:sticky;top:0;z-index:30;
    display:flex;align-items:center;gap:18px;
    padding:14px 22px;
    background:rgba(10,11,20,0.72);
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--stroke);
  }
  .brand{display:flex;align-items:center;gap:11px;font-weight:700;letter-spacing:.2px}
  .logo{
    width:34px;height:34px;border-radius:10px;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    box-shadow:0 6px 22px rgba(124,92,255,0.45);
    font-size:18px;
  }
  .brand .name{font-size:18px}
  .brand .tag{font-size:12px;color:var(--muted);font-weight:500;margin-left:2px}
  .spacer{flex:1}

  .ability{
    display:flex;align-items:center;gap:12px;
    padding:7px 14px;border:1px solid var(--stroke);border-radius:999px;
    background:var(--panel);
  }
  .ability .lvl{font-weight:700;font-size:13px}
  .ability .lvl small{color:var(--muted);font-weight:500}
  .meter{width:140px;height:8px;border-radius:99px;background:rgba(255,255,255,0.08);overflow:hidden}
  .meter > i{
    display:block;height:100%;width:30%;border-radius:99px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    transition:width .7s cubic-bezier(.2,.8,.2,1);
  }
  .progress-chip{font-size:13px;color:var(--muted)}
  .progress-chip b{color:var(--text)}
  .btn{
    font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;
    color:var(--text);background:rgba(255,255,255,0.06);
    border:1px solid var(--stroke-strong);border-radius:10px;padding:8px 14px;
    transition:.15s;
  }
  .btn:hover{background:rgba(255,255,255,0.12);transform:translateY(-1px)}
  .btn.ghost{background:transparent}
  .btn.tiny{padding:5px 10px;font-size:12px;border-radius:8px}

  /* ---------- Layout ---------- */
  .app{display:grid;grid-template-columns:268px 1fr;gap:0;min-height:calc(100vh - 63px)}
  aside{
    border-right:1px solid var(--stroke);
    padding:18px 14px;position:sticky;top:63px;height:calc(100vh - 63px);overflow:auto;
  }
  .side-title{font-size:11px;text-transform:uppercase;letter-spacing:1.4px;color:var(--faint);margin:6px 8px 12px}
  .lesson-item{
    display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:12px;cursor:pointer;
    color:var(--muted);margin-bottom:3px;border:1px solid transparent;transition:.15s;font-size:14px;
  }
  .lesson-item:hover{background:rgba(255,255,255,0.05);color:var(--text)}
  .lesson-item.active{background:rgba(124,92,255,0.14);border-color:rgba(124,92,255,0.4);color:#fff}
  .lesson-item.locked{opacity:.45;cursor:not-allowed}
  .dot{
    width:24px;height:24px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;
    font-size:12px;font-weight:700;background:rgba(255,255,255,0.07);border:1px solid var(--stroke-strong);
  }
  .lesson-item.done .dot{background:linear-gradient(135deg,var(--good),#0ea5e9);border-color:transparent;color:#04211a}
  .lesson-item.active .dot{border-color:var(--accent)}
  .lesson-item .label{flex:1;line-height:1.25}
  .lesson-item .concept{display:block;font-size:11px;color:var(--faint)}
  .sandbox-link{margin-top:14px;border-top:1px solid var(--stroke);padding-top:14px}

  main{padding:26px 30px 80px;max-width:1180px;width:100%;margin:0 auto}

  .card{
    background:var(--panel);border:1px solid var(--stroke);border-radius:var(--radius);
    backdrop-filter:blur(10px);box-shadow:0 18px 50px rgba(0,0,0,0.35);
  }
  .pad{padding:22px 24px}

  .lesson-head h1{margin:0 0 4px;font-size:26px;letter-spacing:-0.3px}
  .lesson-head .crumbs{font-size:12px;color:var(--faint);text-transform:uppercase;letter-spacing:1.3px;margin-bottom:10px}
  .blurb{color:var(--muted);line-height:1.65;font-size:15px}
  .blurb code{font-family:var(--mono);background:rgba(124,92,255,0.16);color:#cbbcff;padding:2px 6px;border-radius:6px;font-size:13px}
  .goal{
    margin-top:18px;display:flex;gap:13px;align-items:flex-start;
    background:linear-gradient(90deg,rgba(124,92,255,0.14),rgba(34,211,238,0.06));
    border:1px solid rgba(124,92,255,0.3);border-radius:13px;padding:15px 17px;
  }
  .goal .gicon{font-size:20px;line-height:1.2}
  .goal .gtext{font-size:15px;line-height:1.5}
  .goal .gtext b{color:#fff}

  .section-label{font-size:11px;text-transform:uppercase;letter-spacing:1.4px;color:var(--faint);margin:26px 2px 12px;font-weight:700}

  /* ---------- Schema tables ---------- */
  .schema{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .tbl-card{background:rgba(13,15,30,0.6);border:1px solid var(--stroke);border-radius:14px;overflow:hidden}
  .tbl-card h3{
    margin:0;padding:12px 15px;font-size:14px;display:flex;align-items:center;gap:9px;
    border-bottom:1px solid var(--stroke);background:rgba(255,255,255,0.03);
  }
  .tbl-card h3 .pill{font-size:10px;font-weight:600;color:var(--faint);background:rgba(255,255,255,0.07);padding:2px 8px;border-radius:99px;text-transform:uppercase;letter-spacing:.6px}
  .tbl-wrap{overflow:auto;max-height:440px}
  table.data{border-collapse:collapse;width:100%;font-family:var(--mono);font-size:12.5px}
  table.data th,table.data td{padding:8px 12px;text-align:left;white-space:nowrap;border-bottom:1px solid rgba(255,255,255,0.05)}
  table.data th{color:var(--muted);font-weight:600;position:relative;transition:.25s}
  table.data td{color:#cfd3ee;transition:.25s}
  table.data tr:last-child td{border-bottom:none}
  table.data td.null{color:var(--faint);font-style:italic}
  /* highlight states */
  .col-ref{background:rgba(52,211,153,0.14)!important}
  th.col-ref{color:#a7f3d0!important;box-shadow:inset 0 -2px 0 var(--ref)}
  .col-key{background:rgba(34,211,238,0.18)!important}
  th.col-key{color:#a5f3fc!important;box-shadow:inset 0 -2px 0 var(--key)}
  th.col-key::after{content:"🔑";position:absolute;right:6px;top:7px;font-size:10px}
  /* row-level highlighting: which rows survive the query */
  table.data tbody tr{transition:opacity .25s}
  tr.row-hit td{background:rgba(52,211,153,0.07)}
  tr.row-hit td:first-child{box-shadow:inset 2.5px 0 0 var(--good)}
  tr.row-miss td{opacity:.32}

  /* ---------- JOIN visualizer ---------- */
  .joinviz{display:grid;grid-template-columns:300px 1fr;gap:22px;align-items:center}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .chip{
    cursor:pointer;font-size:13px;font-weight:600;padding:8px 13px;border-radius:10px;
    border:1px solid var(--stroke-strong);background:rgba(255,255,255,0.05);color:var(--muted);transition:.15s;
  }
  .chip:hover{color:#fff;background:rgba(255,255,255,0.1)}
  .chip.active{background:linear-gradient(135deg,rgba(124,92,255,.9),rgba(34,211,238,.85));color:#08111e;border-color:transparent;box-shadow:0 6px 18px rgba(124,92,255,.4)}
  .viz-explain{font-size:14px;color:var(--muted);line-height:1.6;min-height:48px}
  .viz-explain b{color:#fff}
  .viz-explain .ins{margin-top:10px}
  svg .region{transition:opacity .45s ease, fill .3s}
  svg .region{opacity:0}
  svg .region.on{opacity:1}
  svg .circ{fill:none;stroke:rgba(255,255,255,0.5);stroke-width:2}
  svg .clabel{fill:var(--text);font:600 14px var(--sans)}
  svg .csub{fill:var(--faint);font:500 11px var(--sans)}

  /* ---------- Editor ---------- */
  .editor-wrap{margin-top:6px}
  .editor-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .editor-toolbar .hint-note{font-size:13px;color:var(--muted);flex:1}
  .editor{
    position:relative;border:1px solid var(--stroke-strong);border-radius:13px;overflow:hidden;
    background:#0b0d1c;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .editor.focused{border-color:rgba(124,92,255,0.55);box-shadow:0 0 0 3px rgba(124,92,255,0.18)}
  .editor pre,.editor textarea{
    margin:0;padding:16px 18px;font-family:var(--mono);font-size:14.5px;line-height:1.6;
    tab-size:2;white-space:pre-wrap;word-break:break-word;
    border:0;width:100%;min-height:118px;
  }
  .editor pre{position:absolute;inset:0;pointer-events:none;overflow:auto;color:#dfe3ff}
  .editor textarea{
    position:relative;background:transparent;color:transparent;caret-color:#fff;resize:vertical;
    outline:none;-webkit-text-fill-color:transparent;
  }
  .editor textarea::selection{background:rgba(124,92,255,0.4)}
  .t-kw{color:#c4b5fd;font-weight:600}
  .t-fn{color:#67e8f9}
  .t-str{color:#86efac}
  .t-num{color:#fcd34d}
  .t-com{color:var(--faint);font-style:italic}

  .run-row{display:flex;gap:10px;margin-top:14px;align-items:center;flex-wrap:wrap}
  .btn.run{
    background:linear-gradient(135deg,var(--accent),#9b7bff);border:none;color:#fff;font-size:14px;padding:10px 22px;
    box-shadow:0 8px 22px rgba(124,92,255,.45);
  }
  .btn.run:hover{filter:brightness(1.08)}
  .kbd{font-family:var(--mono);font-size:11px;color:var(--faint);background:rgba(255,255,255,0.06);border:1px solid var(--stroke);border-radius:6px;padding:2px 6px}

  /* ---------- Results ---------- */
  .result{margin-top:18px}
  .banner{
    display:flex;align-items:center;gap:12px;padding:14px 17px;border-radius:13px;font-size:15px;margin-bottom:14px;
    animation:pop .35s cubic-bezier(.2,.9,.3,1.3);
  }
  @keyframes pop{from{transform:scale(.97);opacity:0}to{transform:scale(1);opacity:1}}
  .banner.ok{background:rgba(52,211,153,0.14);border:1px solid rgba(52,211,153,0.4);color:#a7f3d0}
  .banner.err{background:rgba(251,113,133,0.13);border:1px solid rgba(251,113,133,0.4);color:#fecdd3}
  .banner.warn{background:rgba(251,191,36,0.12);border:1px solid rgba(251,191,36,0.4);color:#fde68a}
  .banner .bicon{font-size:20px}
  .banner b{color:#fff}
  .banner .diag{display:inline-block;margin-top:7px;color:#fde68a;line-height:1.5}
  .banner .diag code{background:rgba(0,0,0,0.25);padding:1px 5px;border-radius:5px}
  .result-meta{font-size:12px;color:var(--faint);margin:4px 2px 10px}
  .result-scroll{overflow:auto;border:1px solid var(--stroke);border-radius:12px;max-height:340px}

  .hints{margin-top:16px;display:flex;flex-direction:column;gap:10px}
  .hint{
    background:rgba(251,191,36,0.07);border:1px solid rgba(251,191,36,0.28);border-radius:12px;padding:12px 15px;
    font-size:14px;color:#fde9b8;display:flex;gap:10px;animation:pop .3s ease;
  }
  .hint .hicon{flex:0 0 auto}

  .empty{color:var(--faint);font-size:14px;padding:8px 2px}


  /* ---------- Skills sidebar ---------- */
  .skill-row{display:block;padding:9px 11px;border-radius:12px;cursor:pointer;border:1px solid transparent;color:var(--muted);margin-bottom:3px;transition:.15s}
  .skill-row:hover{background:rgba(255,255,255,0.05);color:var(--text)}
  .skill-row.active{background:rgba(124,92,255,0.14);border-color:rgba(124,92,255,0.4);color:#fff}
  .skill-row.locked{opacity:.45}
  .skill-top{display:flex;justify-content:space-between;align-items:center;font-size:13px;gap:8px}
  .skill-top .cnt{font-size:11px;color:var(--faint);font-family:var(--mono)}
  .skill-bar{height:5px;border-radius:99px;background:rgba(255,255,255,0.08);margin-top:6px;overflow:hidden}
  .skill-bar > i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s}
  .skill-row.mastered .skill-bar > i{background:linear-gradient(90deg,var(--good),#0ea5e9)}

  /* ---------- Auto-advance strip ---------- */
  .auto-next{display:flex;align-items:center;gap:12px;margin:0 0 12px;padding:10px 14px;border:1px solid rgba(52,211,153,0.35);background:rgba(52,211,153,0.08);border-radius:11px;font-size:13px;color:#a7f3d0}
  .auto-track{flex:1;height:5px;background:rgba(255,255,255,0.12);border-radius:99px;overflow:hidden}
  .auto-track > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--good),var(--accent2));animation:autofill 2.2s linear forwards}
  @keyframes autofill{to{width:100%}}

  /* ---------- Walkthrough (tutorial) ---------- */
  .tut{
    margin-top:20px;border-radius:14px;padding:16px 18px;
    border:1px solid rgba(34,211,238,0.35);
    background:linear-gradient(135deg,rgba(34,211,238,0.08),rgba(124,92,255,0.08));
  }
  .tut-head{display:flex;align-items:center;gap:12px}
  .tut-title{font-weight:700;font-size:14px;color:#a5f3fc;white-space:nowrap}
  .tut-count{color:var(--faint);font-weight:500;margin-left:6px}
  .tut-dots{flex:1;display:flex;gap:5px;justify-content:center;flex-wrap:wrap}
  .tdot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.15);transition:.25s}
  .tdot.on{background:linear-gradient(135deg,var(--accent),var(--accent2))}
  .tut-body{animation:pop .3s ease}
  .tut-say{margin:12px 0 4px}
  .tut-code{
    margin:12px 0 8px;padding:13px 16px;background:#0b0d1c;border:1px solid var(--stroke-strong);
    border-radius:11px;font-family:var(--mono);font-size:14px;line-height:1.6;
    white-space:pre-wrap;word-break:break-word;color:#dfe3ff;
  }
  .tut-new{
    display:inline-flex;gap:7px;align-items:center;font-size:12.5px;color:#fde68a;
    background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);
    border-radius:99px;padding:4px 12px;margin:2px 0 8px;
  }
  .tut-new code{font-family:var(--mono)}
  .tut-result{margin-top:10px}
  .tut-result .result-scroll{max-height:240px}
  .tut-nav{display:flex;gap:10px;margin-top:14px;align-items:center}
  .tut-nav #tut-next{margin-left:auto}

  /* loading / error overlay */
  .overlay{
    position:fixed;inset:0;z-index:100;display:grid;place-items:center;
    background:rgba(8,9,16,0.92);backdrop-filter:blur(8px);text-align:center;padding:30px;
  }
  .overlay .box{max-width:440px}
  .spinner{width:46px;height:46px;border-radius:50%;border:4px solid rgba(255,255,255,0.12);border-top-color:var(--accent);margin:0 auto 20px;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .overlay h2{margin:0 0 8px}
  .overlay p{color:var(--muted);line-height:1.6}

  .toast{
    position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(120px);
    background:var(--panel-solid);border:1px solid var(--stroke-strong);border-radius:14px;
    padding:14px 20px;display:flex;align-items:center;gap:14px;z-index:60;box-shadow:0 18px 50px rgba(0,0,0,0.5);
    transition:transform .45s cubic-bezier(.2,.9,.3,1.2);max-width:520px;
  }
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast .ttext{font-size:14px;line-height:1.4}
  .toast .ttext b{color:#fff}

  #confetti{position:fixed;inset:0;pointer-events:none;z-index:80}

  @media (max-width:980px){
    .app{grid-template-columns:1fr}
    aside{position:relative;top:0;height:auto;border-right:none;border-bottom:1px solid var(--stroke)}
    .schema{grid-template-columns:1fr}
    .joinviz{grid-template-columns:1fr}
    .meter{width:90px}
  }
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="box">
    <div class="spinner" id="spinner"></div>
    <h2 id="ov-title">Warming up the database…</h2>
    <p id="ov-msg">Loading a real SQLite engine so your queries actually run.</p>
  </div>
</div>

<header>
  <div class="brand">
    <div class="logo">◧</div>
    <div>
      <span class="name">Querious</span>
      <span class="tag">· learn SQL by doing</span>
    </div>
  </div>
  <div class="spacer"></div>
  <div class="ability" title="Auto-detected from how you solve each step">
    <div class="lvl"><span id="lvl-name">Novice</span> <small id="lvl-sub">· level 1</small></div>
    <div class="meter"><i id="meter-fill"></i></div>
  </div>
  <div class="progress-chip"><b id="prog-done">0</b>/<span id="prog-total">10</span> done</div>
  <button class="btn ghost tiny" id="reset-btn" title="Erase progress and start over">Reset</button>
</header>

<div class="app">
  <aside>
    <div class="side-title">Practice</div>
    <div id="lesson-list"></div>
    <div class="sandbox-link">
      <div class="lesson-item" id="sandbox-item" data-sandbox="1">
        <div class="dot">∞</div>
        <div class="label">Sandbox<span class="concept">run anything you like</span></div>
      </div>
    </div>
  </aside>

  <main id="main"><!-- lesson rendered here --></main>
</div>

<div class="toast" id="toast">
  <div class="ttext" id="toast-text"></div>
  <button class="btn tiny" id="toast-action" style="display:none"></button>
  <button class="btn ghost tiny" id="toast-dismiss">Dismiss</button>
</div>

<canvas id="confetti"></canvas>

<script>
/* ============================================================
   Querious v2 — adaptive practice engine
   200 generated questions · 14 skills · mastery-based selection
   ============================================================ */

/* ---------------- Data ---------------- */
const CUSTOMERS=[
  [1,'Ada','London',36],[2,'Grace','New York',41],[3,'Linus','Helsinki',28],
  [4,'Margaret','Boston',52],[5,'Alan','London',24],[6,'Katherine','New York',47],
  [7,'Tim','Helsinki',33],[8,'Radia','Boston',39],[9,'Edsger','Tokyo',58],
  [10,'Joan','London',62],[11,'Ken','Tokyo',19],[12,'Barbara','Tokyo',45]
];
const ORDERS=[
  [101,1,'Keyboard',45],[102,1,'Monitor',220],[103,1,'Cable',12],
  [104,2,'Mouse',25],[105,2,'Laptop',1200],[106,3,'Webcam',60],
  [107,null,'Headphones',80],[108,5,'Laptop',1150],[109,5,'Headphones',95],
  [110,6,'Keyboard',55],[111,6,'Microphone',130],[112,8,'Monitor',240],
  [113,8,'USB Hub',18],[114,9,'Desk Lamp',35],[115,9,'Laptop',1320],
  [116,9,'Cable',14],[117,10,'Keyboard',70],[118,10,'Webcam',85],
  [119,11,'Mouse',22],[120,11,'USB Hub',20],[121,null,'Desk Lamp',30],
  [122,2,'Headphones',110],[123,6,'Microphone',145],[124,10,'Monitor',199]
];
const COLUMNS={ customers:['id','name','city','age'], orders:['id','customer_id','product','amount'] };
const CITIES=['London','New York','Helsinki','Boston','Tokyo'];
const SCHEMA_SQL =
  'CREATE TABLE customers (id INTEGER PRIMARY KEY, name TEXT, city TEXT, age INTEGER);\n' +
  'INSERT INTO customers (id,name,city,age) VALUES ' +
  CUSTOMERS.map(c=>`(${c[0]},'${c[1]}','${c[2]}',${c[3]})`).join(',') + ';\n' +
  'CREATE TABLE orders (id INTEGER PRIMARY KEY, customer_id INTEGER, product TEXT, amount INTEGER);\n' +
  'INSERT INTO orders (id,customer_id,product,amount) VALUES ' +
  ORDERS.map(o=>`(${o[0]},${o[1]===null?'NULL':o[1]},'${o[2]}',${o[3]})`).join(',') + ';';

/* ---------------- Skills (concepts) ---------------- */

function mulberry(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;let t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296};}
function seededShuffle(arr,seed){const r=mulberry(seed);for(let i=arr.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function fmtCols(cols){const b=cols.map(c=>'<b>'+c+'</b>');return b.length===1?b[0]:b.slice(0,-1).join(', ')+' and '+b[b.length-1];}
function Q(id,concept,level,title,prompt,solution,x){x=x||{};return{id,concept,level,title,prompt,solution,
  orderMatters:!!x.ord,requires:x.req||null,reqMsg:x.reqMsg||null,hints:x.hints||[]};}

  out.push(Q('lj:quiet35','left-join',5,'Quiet and over 35',`Find customers with <b>no orders</b> who are <b>older than 35</b> — show <b>name and age</b>.`,`SELECT customers.name, customers.age FROM customers LEFT JOIN orders ${ON} WHERE orders.id IS NULL AND customers.age > 35`,{...rq,hints:['Combine the IS NULL trick with a normal condition using AND.','<code>WHERE orders.id IS NULL AND customers.age &gt; 35</code>']}));
  out.push(Q('lj:orders:pn','left-join',5,'Keep every order',`Show every order's <b>product</b> and buyer <b>name</b> — keeping the two orphan orders (NULL name). Which table must be on the left?`,`SELECT orders.product, customers.name FROM orders LEFT JOIN customers ON customers.id = orders.customer_id`,{...rq,hints:['LEFT keeps the table after FROM — so start FROM orders this time.','<code>FROM orders LEFT JOIN customers ON customers.id = orders.customer_id</code>']}));
  out.push(Q('lj:orders:pan','left-join',5,'Orders ledger',`Show <b>product, amount and buyer name</b> for every order — orphans included (NULL name).`,`SELECT orders.product, orders.amount, customers.name FROM orders LEFT JOIN customers ON customers.id = orders.customer_id`,{...rq,hints:['Same flip: FROM orders LEFT JOIN customers.','Columns in order: product, amount, name.']}));
  out.push(Q('lj:orphans','left-join',5,'The orphans',`Find the orders with <b>no customer</b> — show <b>product and amount</b>. (LEFT JOIN from orders + IS NULL.)`,`SELECT orders.product, orders.amount FROM orders LEFT JOIN customers ON customers.id = orders.customer_id WHERE customers.id IS NULL`,{...rq,hints:['Flip the tables, then the IS NULL trick on the customers side.','<code>WHERE customers.id IS NULL</code>']}));

  return out;
};
FAMILIES['full-join']=()=>{

    Q('fj:unmatched','full-join',5,'Only the lonely',`Show only the <b>unmatched</b> rows from both sides — <b>name and product</b>. (Quiet customers and orphan orders.)`,`SELECT customers.name, orders.product FROM customers FULL JOIN orders ${ON} WHERE customers.id IS NULL OR orders.id IS NULL`,{...rq,hints:['After a FULL JOIN, unmatched rows have NULL on one side.','<code>WHERE customers.id IS NULL OR orders.id IS NULL</code>']}),

    Q('fj:ncp','full-join',4,'Everything, three ways',`Show <b>name, city and product</b> for everything — both unmatched sides included.`,`SELECT customers.name, customers.city, orders.product FROM customers FULL JOIN orders ${ON}`,{...rq,hints:H})

FAMILIES['join-group']=()=>{
  const out=[];const ON='ON customers.id = orders.customer_id';
  const rqL={req:/\bleft\b[\s\S]*\bgroup\s+by\b/i,reqMsg:'a <code>LEFT JOIN</code> plus <code>GROUP BY</code>'};
  const rqJ={req:/\bjoin\b[\s\S]*\bgroup\s+by\b/i,reqMsg:'a <code>JOIN</code> plus <code>GROUP BY</code>'};
  out.push(Q('jg:left:count','join-group',5,'Orders per customer (zeros too)',`For <b>every</b> customer (quiet ones included), show <b>name</b> and their <b>number of orders</b> — which must be <b>0</b> for the quiet ones. ⚠️ <code>COUNT(orders.id)</code>, not COUNT(*).`,`SELECT customers.name, COUNT(orders.id) FROM customers LEFT JOIN orders ${ON} GROUP BY customers.id`,{...rqL,hints:['LEFT JOIN keeps the quiet customers; COUNT(orders.id) ignores their NULL rows.','<code>SELECT name, COUNT(orders.id) … LEFT JOIN … GROUP BY customers.id</code>']}));
  out.push(Q('jg:left:sum','join-group',4,'Spend per customer (everyone)',`For <b>every</b> customer, show <b>name</b> and their <b>total spend</b> (NULL for the quiet ones is fine).`,`SELECT customers.name, SUM(orders.amount) FROM customers LEFT JOIN orders ${ON} GROUP BY customers.id`,{...rqL,hints:['LEFT JOIN, then SUM per customer.','<code>GROUP BY customers.id</code> keeps one row per person.']}));
  out.push(Q('jg:left:max','join-group',4,'Biggest order each',`For <b>every</b> customer, show <b>name</b> and their <b>largest order</b> (NULL if none).`,`SELECT customers.name, MAX(orders.amount) FROM customers LEFT JOIN orders ${ON} GROUP BY customers.id`,{...rqL,hints:['Same skeleton, MAX instead of SUM.','<code>MAX(orders.amount)</code>']}));
  out.push(Q('jg:left:avg','join-group',4,'Average order each',`For <b>every</b> customer, show <b>name</b> and their <b>average order</b> (NULL if none).`,`SELECT customers.name, AVG(orders.amount) FROM customers LEFT JOIN orders ${ON} GROUP BY customers.id`,{...rqL,hints:['Same skeleton, AVG.','<code>AVG(orders.amount)</code>']}));
  [['count','COUNT(*)','number of orders'],['sum','SUM(orders.amount)','total spend'],['avg','AVG(orders.amount)','average order'],['max','MAX(orders.amount)','biggest order']].forEach(([k,agg,txt])=>
    out.push(Q('jg:inner:'+k,'join-group',4,'Buyers only',`For customers <b>who have ordered</b>, show <b>name</b> and their <b>${txt}</b>.`,`SELECT customers.name, ${agg} FROM customers JOIN orders ${ON} GROUP BY customers.id`,{...rqJ,hints:['A plain JOIN drops the quiet customers — exactly what we want here.','<code>GROUP BY customers.id</code>, aggregate '+agg+'.']})));
  [['count','COUNT(*)','number of orders placed by its customers'],['sum','SUM(orders.amount)','total its customers spent'],['avg','AVG(orders.amount)','average order value'],['max','MAX(orders.amount)','biggest single order']].forEach(([k,agg,txt])=>
    out.push(Q('jg:city:'+k,'join-group',4,'Per city',`For each <b>city with purchases</b>, show the city and the <b>${txt}</b>.`,`SELECT customers.city, ${agg} FROM customers JOIN orders ${ON} GROUP BY customers.city`,{...rqJ,hints:['Join, then group by the customers.city column.','<code>GROUP BY customers.city</code>']})));
  out.push(Q('jg:topspender','join-group',5,'The whale',`Who spent the most overall? Show the single top spender's <b>name and total</b>.`,`SELECT customers.name, SUM(orders.amount) FROM customers JOIN orders ${ON} GROUP BY customers.id ORDER BY SUM(orders.amount) DESC LIMIT 1`,{...rqJ,ord:true,hints:['Group per customer, sort by the SUM descending, keep 1.','<code>ORDER BY SUM(orders.amount) DESC LIMIT 1</code>']}));
  out.push(Q('jg:topcity','join-group',5,'Top city',`Which city generated the most revenue? Show that one city's <b>name and total</b>.`,`SELECT customers.city, SUM(orders.amount) FROM customers JOIN orders ${ON} GROUP BY customers.city ORDER BY SUM(orders.amount) DESC LIMIT 1`,{...rqJ,ord:true,hints:['Same trick, grouped by city.','<code>… GROUP BY customers.city ORDER BY SUM(…) DESC LIMIT 1</code>']}));
  out.push(Q('jg:citycount:desc','join-group',5,'Cities by activity',`For each city with purchases, show <b>city and order count</b> — most active city first.`,`SELECT customers.city, COUNT(*) FROM customers JOIN orders ${ON} GROUP BY customers.city ORDER BY COUNT(*) DESC`,{...rqJ,ord:true,hints:['Group by city, order by the COUNT.','<code>ORDER BY COUNT(*) DESC</code>']}));
  out.push(Q('jg:namesum:desc','join-group',5,'Spend leaderboard',`For customers who have ordered, show <b>name and total spend</b> — biggest first.`,`SELECT customers.name, SUM(orders.amount) FROM customers JOIN orders ${ON} GROUP BY customers.id ORDER BY SUM(orders.amount) DESC`,{...rqJ,ord:true,hints:['Inner join (buyers only), then sort the sums.','<code>ORDER BY SUM(orders.amount) DESC</code>']}));
  out.push(Q('jg:having:city5','join-group',5,'Five-plus cities',`Show each <b>city</b> with <b>more than 5</b> orders — city and the count.`,`SELECT customers.city, COUNT(*) FROM customers JOIN orders ${ON} GROUP BY customers.city HAVING COUNT(*) > 5`,{...rqJ,hints:['Join, group, then HAVING on the count.','<code>HAVING COUNT(*) &gt; 5</code>']}));
  out.push(Q('jg:having:sum300','join-group',5,'300 club',`Show the <b>name and total</b> of customers whose total spend is <b>over 300</b>.`,`SELECT customers.name, SUM(orders.amount) FROM customers JOIN orders ${ON} GROUP BY customers.id HAVING SUM(orders.amount) > 300`,{...rqJ,hints:['Group per customer, HAVING on the SUM.','<code>HAVING SUM(orders.amount) &gt; 300</code>']}));
  out.push(Q('jg:where:city100','join-group',5,'Premium orders per city',`Counting only orders <b>over 100</b>: show each city and its count of such orders.`,`SELECT customers.city, COUNT(*) FROM customers JOIN orders ${ON} WHERE orders.amount > 100 GROUP BY customers.city`,{...rqJ,hints:['WHERE filters before grouping.','<code>WHERE orders.amount &gt; 100 GROUP BY customers.city</code>']}));

  out.push(Q('jg:where:small','join-group',5,'Small-order tally',`Counting only orders <b>under 100</b>: show each buyer's <b>name and count</b> of such orders.`,`SELECT customers.name, COUNT(*) FROM customers JOIN orders ${ON} WHERE orders.amount < 100 GROUP BY customers.id`,{...rqJ,hints:['WHERE before GROUP BY.','<code>WHERE orders.amount &lt; 100</code>']}));
  out.push(Q('jg:laptopcities','join-group',5,'Laptop map',`For each city where a <b>Laptop</b> was bought, show the <b>city and how many</b>.`,`SELECT customers.city, COUNT(*) FROM customers JOIN orders ${ON} WHERE orders.product = 'Laptop' GROUP BY customers.city`,{...rqJ,hints:['Filter to Laptops first, then group by city.',"<code>WHERE orders.product = 'Laptop' GROUP BY customers.city</code>"]}));
  return out;
};

/* ---------------- Build the bank: exactly 200 ---------------- */
const QUESTIONS=[];
CONCEPT_ORDER.forEach((cid,ci)=>{
  const pool=FAMILIES[cid]();
  seededShuffle(pool,0xC0FFEE+ci);
  pool.slice(0,QUOTA[cid]).forEach(q=>QUESTIONS.push(q));
});
QUESTIONS.forEach((q,i)=>{ q.num=i+1; q.hints=[...q.hints,'Full answer: <code>'+q.solution.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</code>']; });
const QBYID={}; QUESTIONS.forEach(q=>QBYID[q.id]=q);
const QBYCONCEPT={}; CONCEPT_ORDER.forEach(c=>QBYCONCEPT[c]=QUESTIONS.filter(q=>q.concept===c));
console.assert(QUESTIONS.length===200,'bank size',QUESTIONS.length);

/* ---------------- Persistent state (v2) ---------------- */
const SAVE_KEY='querious.v2';
const defaultState=()=>({v:2,tick:0,focus:null,lastQid:null,totalSolved:0,
  mastery:{},solved:{},servedAt:{},tutsSeen:{},seenIntro:false,finished:false});
let state=load();
function load(){
  try{const s=JSON.parse(localStorage.getItem(SAVE_KEY));if(s&&s.v===2)return Object.assign(defaultState(),s);}catch(e){}
  const st=defaultState();
  try{ // migrate v1: solved lessons seed the matching skill + skip its walkthrough
    const v1=JSON.parse(localStorage.getItem('querious.v1'));
    if(v1&&v1.lessons){
      const map={'select-all':'select','pick-cols':'columns','where':'where','order':'order','count':'aggregate','groupby':'group','inner-join':'inner-join','left-join':'left-join','full-join':'full-join','final':'join-group'};
      for(const lid in v1.lessons){ if(v1.lessons[lid].solved&&map[lid]){ st.tutsSeen[map[lid]]=true; st.mastery[map[lid]]={m:0.5,n:1,last:0}; } }
      localStorage.removeItem('querious.v1');
    }
  }catch(e){}
  return st;
}
function save(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(state));}catch(e){}}

/* ---------------- Learner model ---------------- */
function mstat(cid){return state.mastery[cid]||(state.mastery[cid]={m:0,n:0,last:0});}
function mastery(cid){return mstat(cid).m;}
function unlocked(cid){return PREREQ[cid].every(p=>{const s=mstat(p);return s.m>=0.45||s.n>=2;});}
function unlockedList(){return CONCEPT_ORDER.filter(unlocked);}
function skillPct(){const t=CONCEPT_ORDER.reduce((a,c)=>a+mastery(c),0);return Math.round(t/CONCEPT_ORDER.length*100);}
function updateMastery(cid,score,alpha){
  const s=mstat(cid); alpha=alpha==null?0.3:alpha;
  s.m=Math.max(0,Math.min(1,s.m+alpha*(score-s.m))); s.n++; s.last=state.tick;
}
function qualityOf(T){
  if(T.revealed)return 0.15;
  if(T.hints>=2)return 0.5;
  if(T.hints===1)return 0.68;
  let q=(T.attempts<=1&&T.errors===0)?1:0.85;
  return Math.max(0.3,q-0.05*Math.min(T.errors,3));
}

/* ---------------- Question selection ---------------- */
let lastConcept=null,lastConceptRun=0;
function remainingUnsolved(cid){return QBYCONCEPT[cid].filter(q=>!state.solved[q.id]).length;}
function pickFrom(cid){
  const m=mastery(cid);
  const target=m<0.35?1:m<0.55?2:m<0.72?3:m<0.86?4:5;
  let pool=QBYCONCEPT[cid].filter(q=>!state.solved[q.id]);
  if(!pool.length) pool=[...QBYCONCEPT[cid]].sort((a,b)=>(state.servedAt[a.id]||0)-(state.servedAt[b.id]||0)).slice(0,6);
  pool=[...pool].sort((a,b)=>{
    const da=Math.abs(a.level-target),dbb=Math.abs(b.level-target);
    if(da!==dbb)return da-dbb;
    return (state.servedAt[a.id]||0)-(state.servedAt[b.id]||0);
  });
  const top=pool.slice(0,Math.min(3,pool.length));
  return top[Math.floor(Math.random()*top.length)];
}
function pickNextQuestion(){
  if(state.focus&&unlocked(state.focus))return pickFrom(state.focus);
  const ul=unlockedList();
  const fresh=ul.find(c=>mstat(c).n===0);                  // introduce the next new skill, in course order
  if(fresh&&Math.random()<0.6)return pickFrom(fresh);
  let cands=ul.filter(c=>remainingUnsolved(c)>0); if(!cands.length)cands=ul;
  const weights=cands.map(c=>{
    let w=Math.pow(1-mastery(c),2)+0.15;
    if(mstat(c).n===0)w+=0.35;                             // gentle pull toward unexplored skills
    if(c===lastConcept&&lastConceptRun>=2)w*=0.2;          // vary the diet
    return w;
  });
  let r=Math.random()*weights.reduce((a,b)=>a+b,0);
  for(let i=0;i<cands.length;i++){r-=weights[i];if(r<=0)return pickFrom(cands[i]);}
  return pickFrom(cands[cands.length-1]);
}
function weakestSkill(){
  const seen=unlockedList().filter(c=>mstat(c).n>0);
  if(!seen.length)return null;
  return seen.sort((a,b)=>mastery(a)-mastery(b))[0];
}

/* ---------------- Ability meter ---------------- */
const LEVELS=[{min:0,name:'Novice'},{min:25,name:'Learning'},{min:48,name:'Confident'},{min:68,name:'Sharp'},{min:86,name:'Fluent'}];
function levelFor(p){let cur=LEVELS[0],n=1;LEVELS.forEach((l,i)=>{if(p>=l.min){cur=l;n=i+1;}});return{name:cur.name,n};}
function refreshAbility(){
  const p=skillPct(),lv=levelFor(p);
  document.getElementById('lvl-name').textContent=lv.name;
  document.getElementById('lvl-sub').textContent='· level '+lv.n;
  document.getElementById('meter-fill').style.width=Math.max(4,p)+'%';
  document.getElementById('prog-done').textContent=state.totalSolved;
}

/* ---------------- Sidebar: skills panel ---------------- */
function renderSkills(){
  const list=document.getElementById('lesson-list');list.innerHTML='';
  const auto=document.createElement('div');
  auto.className='lesson-item'+(state.focus===null&&view==='q'?' active':'');
  auto.innerHTML='<div class="dot">🎯</div><div class="label">Auto practice<span class="concept">picks what you need next</span></div>';
  auto.onclick=()=>{state.focus=null;save();openNext();};
  list.appendChild(auto);
  CONCEPT_ORDER.forEach(cid=>{
    const meta=CONCEPT_META[cid],s=mstat(cid),un=unlocked(cid);
    const solvedN=QBYCONCEPT[cid].filter(q=>state.solved[q.id]).length;
    const row=document.createElement('div');
    row.className='skill-row'+(state.focus===cid&&view==='q'?' active':'')+(un?'':' locked')+(s.m>=0.8?' mastered':'');
    row.innerHTML=`<div class="skill-top"><span>${un?'':'🔒 '}${meta.label}</span><span class="cnt">${solvedN}/${QUOTA[cid]}</span></div>
      <div class="skill-bar"><i style="width:${Math.round(s.m*100)}%"></i></div>`;
    row.onclick=()=>{
      if(!un){const need=PREREQ[cid].filter(p=>!(mstat(p).m>=0.45||mstat(p).n>=2)).map(p=>CONCEPT_META[p].label).join(', ');
        showToast('🔒 <b>'+meta.label+'</b> unlocks after you get comfortable with: <b>'+need+'</b>.',null,5000);return;}
      state.focus=cid;save();openNext();
    };
    list.appendChild(row);
  });
  const sb=document.getElementById('sandbox-item');
  sb.classList.toggle('active',view==='sandbox');
}

/* ---------------- DB bootstrap ---------------- */
let db=null,view='q',CURQ=null,T=null,hintsShown=0,autoTimer=null,pendingTutQ=null;
(async function init(){
  if(typeof initSqlJs==='undefined'){return failBoot();}
  try{
    const SQL=await initSqlJs({locateFile:f=>`https://cdn.jsdelivr.net/npm/sql.js@1.12.0/dist/${f}`});
    db=new SQL.Database();db.run(SCHEMA_SQL);
    try{db.exec('SELECT 1 FROM customers FULL JOIN orders ON 1=0 LIMIT 1');}
    catch(e){console.warn('FULL JOIN not supported by this engine build');}
    document.getElementById('overlay').style.display='none';
    boot();
  }catch(err){console.error(err);failBoot();}
})();
function failBoot(){
  document.getElementById('spinner').style.display='none';
  document.getElementById('ov-title').textContent='Couldn’t load the SQL engine';
  document.getElementById('ov-msg').innerHTML='Querious runs a real SQLite database in your browser, which needs an internet connection the first time it loads.<br><br>Please check your connection and refresh the page.';
}
function boot(){
  if('scrollRestoration' in history)history.scrollRestoration='manual';
  window.scrollTo(0,0);
  document.getElementById('prog-total').textContent=QUESTIONS.length;
  refreshAbility();
  document.getElementById('reset-btn').onclick=()=>{
    if(confirm('Erase all progress and start fresh?')){state=defaultState();save();location.reload();}
  };
  document.getElementById('sandbox-item').onclick=openSandbox;
  document.getElementById('toast-dismiss').onclick=hideToast;
  const resume=state.lastQid&&QBYID[state.lastQid]&&!state.solved[state.lastQid]?QBYID[state.lastQid]:null;
  if(resume){renderSkills();openQuestion(resume);}else openNext();
  if(!state.seenIntro){
    showToast('👋 <b>Welcome to practice mode!</b> 200 questions across 14 skills. I pick each next one based on what you need — solve it, and the next loads automatically. New skills always start with a walkthrough.',null,10000);
    state.seenIntro=true;save();
  }
}

/* ---------------- Serving questions ---------------- */
function openNext(){
  clearTimeout(autoTimer);autoTimer=null;
  const q=pickNextQuestion();
  if(q.concept===lastConcept)lastConceptRun++;else{lastConcept=q.concept;lastConceptRun=1;}
  state.tick++;state.servedAt[q.id]=state.tick;state.lastQid=q.id;save();
  openQuestion(q);
}
function openQuestion(q,opts){
  opts=opts||{};
  clearTimeout(autoTimer);autoTimer=null;
  view='q';CURQ=q;T={attempts:0,hints:0,errors:0,revealed:false};
  hintsShown=0;currentJoinType=null;curTutSql='';
  state.lastQid=q.id;save();
  renderSkills();
  const meta=CONCEPT_META[q.concept];
  const tutActive=!!TUTORIALS[q.concept]&&(opts.tut===true||(opts.tut!==false&&!state.tutsSeen[q.concept]));
  const dots='●'.repeat(q.level)+'○'.repeat(5-q.level);
  const solvedBefore=!!state.solved[q.id];
  const head=`
      <div class="crumbs">${meta.label} · difficulty ${dots} · question #${q.num} of ${QUESTIONS.length}${solvedBefore?' · ✓ solved before':''}</div>
      <h1>${q.title}</h1>
      <p class="blurb">${meta.blurb}</p>`;
  const tablesBlock=`
      <div class="section-label">The tables · <span style="text-transform:none;font-weight:500;color:var(--muted)">reference — columns &amp; rows light up as you type</span></div>
      <div class="schema" id="schema"></div>`;
  const m=document.getElementById('main');
  if(tutActive){
    pendingTutQ=q;
    m.innerHTML=`
    <div class="card pad lesson-head">
      ${head}
      <div class="tut" id="tut">
        <div class="tut-head">
          <span class="tut-title">📖 Walkthrough <span class="tut-count">step <b id="tut-num">1</b> of ${TUTORIALS[q.concept].length}</span></span>
          <span class="tut-dots" id="tut-dots"></span>
          <button class="btn ghost tiny" id="tut-skip">Skip — I know this →</button>
        </div>
        <div class="tut-body" id="tut-body"></div>
        <div class="tut-nav">
          <button class="btn tiny" id="tut-back">← Back</button>
          <button class="btn run" id="tut-next">Next →</button>
        </div>
      </div>
      ${meta.join?joinVizHTML():''}
      ${tablesBlock}
    </div>`;
    renderSchema();
    if(meta.join)initJoinViz();
    initTut(q.concept);
    return;

/* ---------------- Running & checking ---------------- */
/* Plain-English diagnosis of what's actually wrong with the user's SQL,
   so an error reads like a tutor, not a parser. Returns a string or null. */
function diagnose(sql,errMsg,q){
  const s=(sql||'').trim();if(!s)return null;
  const low=s.toLowerCase();
  const selIdx=low.search(/\bselect\b/);
  const fromIdx=low.search(/\bfrom\b/);
  // clause order — the classic "FROM ... SELECT ..."
  if(fromIdx>=0&&selIdx>=0&&fromIdx<selIdx)
    return 'Clause order matters in SQL: <code>SELECT</code> (the columns) comes <b>first</b>, then <code>FROM</code> (the table). Re-order it to <code>SELECT … FROM …</code>.';
  if(selIdx<0&&fromIdx>=0)
    return 'Every query has to start with <code>SELECT</code>. Add it before your column list.';
  if(selIdx>=0&&fromIdx<0&&!/\bfrom\b/.test(low))
    return 'You’ve chosen columns but not said <i>from which table</i> — add <code>FROM customers</code> or <code>FROM orders</code>.';
  if(errMsg){
    let m=errMsg.match(/no such column:\s*([^\s)]+)/i);
    if(m){
      const col=m[1];
      if(/^[A-Za-z]/.test(col)&&!col.includes('.'))
        return `The database is reading <code>${escapeText(col)}</code> as a column name. If you meant it as a <b>text value</b>, wrap it in single quotes: <code>'${escapeText(col)}'</code>. Otherwise check the spelling against the table headers below.`;
      return `There’s no column called <code>${escapeText(col)}</code> — check the spelling against the headers in the tables below.`;
    }
    m=errMsg.match(/no such table:\s*([^\s)]+)/i);
    if(m)return `There’s no table called <code>${escapeText(m[1])}</code> — the only two tables are <code>customers</code> and <code>orders</code>.`;
    if((s.split("'").length-1)%2===1)
      return 'A quote looks unbalanced — text values need a matching <b>pair</b> of single quotes, like <code>\'London\'</code>.';
    if(/\bgroup\b(?!\s+by)/i.test(low))
      return 'It’s two words: <code>GROUP BY</code> (not just GROUP).';
    if(/\border\b(?!\s+by)/i.test(low))
      return 'It’s two words: <code>ORDER BY</code> (not just ORDER).';
  }
  // valid-but-wrong: nudge toward the skill this question practises
  if(!errMsg&&q&&q.requires&&!q.requires.test(s)&&q.reqMsg)
    return `This question is practising ${q.reqMsg} — make sure your query uses it.`;
  return null;
}
function runQuery(){
  const q=view==='q'?CURQ:null;
  const sql=taEl.value.trim();
  const resBox=document.getElementById('result');
  if(!sql){resBox.innerHTML='';banner('warn','✏️','Write a query first, then hit Run.');return;}
  let out;
  try{out=db.exec(sql);}
  catch(err){
    if(q){T.errors++;}
    resBox.innerHTML='';
    const dg=diagnose(sql,err.message,q);
    banner('err','⚠️',`<b>SQL error:</b> ${escapeText(err.message)}${dg?`<br><span class="diag">💡 ${dg}</span>`:''}`);
    if(q&&T.errors>=2){document.getElementById('reveal-btn').style.display='inline-block';if(hintsShown===0&&!dg)showNextHint(true);}
    return;
  }
  const result=out.length?out[out.length-1]:null;
  resBox.innerHTML='';
  if(view==='sandbox'){
    if(!result){banner('ok','✓','Statement ran. (No rows to show.)');}
    else{banner('ok','✓',`Returned <b>${result.values.length}</b> row(s).`);resBox.appendChild(renderTable(result));}
    return;
  }
  T.attempts++;
  const check=checkAnswer(q,result);
  if(check.ok){
    complete(q,result);
  }else{
    const dg=diagnose(sql,null,q);
    banner('err','✗',`<b>Not quite.</b> ${check.msg}${dg?`<br><span class="diag">💡 ${dg}</span>`:''}`);
    if(result)resBox.appendChild(renderTable(result));
    if(T.attempts>=2||T.errors>=2)document.getElementById('reveal-btn').style.display='inline-block';
    if(T.attempts>=2&&hintsShown===0)showToast('💡 Tip: tap <b>Hint</b> for a nudge — one clue at a time.',null,4000);
  }
}
function complete(q,result){
  const resBox=document.getElementById('result');
  const firstSolve=!state.solved[q.id];
  const quality=qualityOf(T);
  const before=new Set(unlockedList());
  if(firstSolve){
    state.solved[q.id]={t:Date.now(),hints:T.hints,attempts:T.attempts,revealed:T.revealed};
    state.totalSolved++;
    updateMastery(q.concept,quality);
  }else{
    updateMastery(q.concept,quality,0.12);
  }
  save();renderSkills();refreshAbility();
  const after=unlockedList().filter(c=>!before.has(c));
  banner('ok','🎉',`<b>Correct!</b>${firstSolve?'':' (repeat — still counts as practice)'}`);
  const strip=document.createElement('div');
  strip.className='auto-next';
  strip.innerHTML=`<span>Next question</span><div class="auto-track"><i></i></div><button class="btn tiny" id="next-now">Now ▸</button><button class="btn ghost tiny" id="next-stay">✕ stay</button>`;
  resBox.appendChild(strip);
  if(result)resBox.appendChild(renderTable(result,true));
  document.getElementById('reveal-btn').style.display='none';
  const hb=document.getElementById('hint-btn');if(hb)hb.style.display='none';
  document.getElementById('next-now').onclick=()=>openNext();
  document.getElementById('next-stay').onclick=()=>{clearTimeout(autoTimer);autoTimer=null;strip.remove();};
  clearTimeout(autoTimer);
  autoTimer=setTimeout(()=>openNext(),2200);
  if(firstSolve)celebrate();
  after.forEach(c=>showToast('🔓 <b>New skill unlocked:</b> '+CONCEPT_META[c].label+' — it\'s now in the sidebar.',null,5000));
  if(firstSolve&&state.totalSolved>0&&state.totalSolved%5===0){
    const w=weakestSkill();
    if(w)showToast('📊 '+state.totalSolved+'/200 solved. Weakest skill right now: <b>'+CONCEPT_META[w].label+'</b> — I\'ll mix more of it in.',null,5000);
  }
  if(state.totalSolved>=QUESTIONS.length&&!state.finished){
    state.finished=true;save();
    showToast('🏆 <b>ALL 200 SOLVED.</b> Genuinely impressive. I\'ll keep serving repeats to keep you sharp — or go play in the Sandbox.',null,12000);
    celebrate();setTimeout(celebrate,600);
  }
}
function runSolution(q){try{const o=db.exec(q.solution);return o.length?o[o.length-1]:null;}catch(e){return null;}}
function normRows(result){
  if(!result)return[];
  return result.values.map(r=>r.map(v=>{
    if(v===null||v===undefined)return' NULL';
    if(typeof v==='number')return String(Math.round(v*1e6)/1e6);
    return String(v);
  }));
}
function checkAnswer(q,userResult){
  if(q.requires&&!q.requires.test(taEl.value)){
    return{ok:false,msg:`Your result may be close, but this question is practising ${q.reqMsg} — make sure your query uses it.`};
  }
  const sol=runSolution(q);
  const want=normRows(sol),got=normRows(userResult);
  if(got.length===0&&want.length>0)return{ok:false,msg:`Your query returned <b>no rows</b>; the goal expects <b>${want.length}</b>.`};
  const wantCols=sol?sol.columns.length:0,gotCols=userResult?userResult.columns.length:0;
  if(gotCols!==wantCols)return{ok:false,msg:`You returned <b>${gotCols}</b> column(s); the goal expects <b>${wantCols}</b>. Re-read which columns the task asks for.`};
  if(q.orderMatters){
    const same=got.length===want.length&&got.every((r,i)=>JSON.stringify(r)===JSON.stringify(want[i]));
    if(same)return{ok:true};
    if(sameMultiset(got,want))return{ok:false,msg:`Right rows, <b>wrong order</b> — check your <code>ORDER BY</code> (and its direction).`};
    return{ok:false,msg:rowCountMsg(got,want)};
  }
  if(sameMultiset(got,want))return{ok:true};
  return{ok:false,msg:rowCountMsg(got,want)};
}
function sameMultiset(a,b){
  if(a.length!==b.length)return false;
  const sa=a.map(r=>JSON.stringify(r)).sort(),sb=b.map(r=>JSON.stringify(r)).sort();
  return sa.every((v,i)=>v===sb[i]);
}
function rowCountMsg(got,want){
  if(got.length!==want.length)return`You returned <b>${got.length}</b> row(s); the goal has <b>${want.length}</b>. ${got.length>want.length?'Too many — tighten your filter or join.':'Too few — are you dropping rows you should keep?'}`;
  return`Right shape, but some <b>values differ</b> from what's expected.`;
}

function tableCardHTML(tname,label){
  const cols=COLUMNS[tname];
  let res;try{res=db.exec('SELECT '+cols.join(',')+' FROM '+tname)[0];}catch(e){res={columns:cols,values:[]};}

    <div class="tbl-wrap"><table class="data"><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div></div>`;

/* ---------------- Editor + syntax highlight ---------------- */
const KEYWORDS=['select','from','where','and','or','not','null','is','in','like','between','order','by','group','having','limit','offset','as','on','using','join','inner','left','right','full','outer','cross','union','all','distinct','asc','desc','case','when','then','else','end','exists'];
const FUNCS=['count','sum','avg','min','max','round','upper','lower','length','coalesce','abs','ifnull'];
const HL_RE=new RegExp('(--[^\\n]*)'+'|'+"('(?:[^']|'')*')"+'|'+'(\\b\\d+(?:\\.\\d+)?\\b)'+'|'+'\\b('+KEYWORDS.join('|')+')\\b'+'|'+'\\b('+FUNCS.join('|')+')\\b','gi');
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escapeText(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function highlight(escaped){
  return escaped.replace(HL_RE,(m,c,s,n,kw,fn)=>{
    if(c)return`<span class="t-com">${c}</span>`;
    if(s)return`<span class="t-str">${s}</span>`;
    if(n)return`<span class="t-num">${n}</span>`;
    if(kw)return`<span class="t-kw">${m}</span>`;
    if(fn)return`<span class="t-fn">${m}</span>`;
    return m;
  });
}
let editorEl,taEl,hlEl;
function wireEditor(initial){
  editorEl=document.getElementById('editor');
  taEl=document.getElementById('sql');
  hlEl=document.getElementById('hl');
  taEl.value=initial;
  paint();
  taEl.addEventListener('input',()=>{paint();debouncedAnalyze();
    if(autoTimer){clearTimeout(autoTimer);autoTimer=null;const s=document.querySelector('.auto-next');if(s)s.remove();}});
  taEl.addEventListener('scroll',()=>{const pre=hlEl.parentElement;pre.scrollTop=taEl.scrollTop;pre.scrollLeft=taEl.scrollLeft;});
  taEl.addEventListener('focus',()=>editorEl.classList.add('focused'));
  taEl.addEventListener('blur',()=>editorEl.classList.remove('focused'));
  taEl.addEventListener('keydown',e=>{
    if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){e.preventDefault();runQuery();}
    if(e.key==='Tab'){e.preventDefault();insertAtCursor('  ');}
  });
  document.getElementById('run-btn').onclick=runQuery;
  const hb=document.getElementById('hint-btn');if(hb)hb.onclick=()=>showNextHint(false);
  const rv=document.getElementById('reveal-btn');if(rv)rv.onclick=revealSolution;
  analyzeSql();
  taEl.focus({preventScroll:true});
}
function paint(){hlEl.innerHTML=highlight(escapeHtml(taEl.value))+'\n';}
function insertAtCursor(text){
  const s=taEl.selectionStart,e=taEl.selectionEnd;
  taEl.value=taEl.value.slice(0,s)+text+taEl.value.slice(e);
  taEl.selectionStart=taEl.selectionEnd=s+text.length;
  paint();debouncedAnalyze();
}
let analyzeTimer=null;
function debouncedAnalyze(){clearTimeout(analyzeTimer);analyzeTimer=setTimeout(analyzeSql,120);}

/* ---------------- Column highlighting ---------------- */
function clearHighlights(){
  document.querySelectorAll('[data-col]').forEach(el=>el.classList.remove('col-ref','col-key'));
  document.querySelectorAll('tr.row-hit,tr.row-miss').forEach(tr=>tr.classList.remove('row-hit','row-miss'));
}
function highlightCol(table,col,cls){document.querySelectorAll(`[data-col="${table}.${col}"]`).forEach(el=>el.classList.add(cls));}
function analyzeSql(){
  const ed=document.getElementById('sql');
  if(!ed)return;
  taEl=ed;
  applyHighlightsFor(ed.value);
}
function hlKeys(){highlightCol('customers','id','col-key');highlightCol('orders','customer_id','col-key');}
function unionVizKeys(){if(currentJoinType&&document.getElementById('join-chips'))hlKeys();}
function applyHighlightsFor(sql){
  clearHighlights();
  if(!sql||!sql.trim()){unionVizKeys();return;}
  const alias={customers:'customers',orders:'orders'};
  const aliasRe=/\b(?:from|join)\s+([a-z_]\w*)(?:\s+(?:as\s+)?([a-z_]\w*))?/ig;
  let m;
  while((m=aliasRe.exec(sql))){
    const tbl=m[1].toLowerCase();
    if(!COLUMNS[tbl])continue;
    if(m[2]){const a=m[2].toLowerCase();if(!isKeyword(a))alias[a]=tbl;}
  }
  const refRe=/\b([a-z_]\w*)\.([a-z_]\w*)/ig;
  while((m=refRe.exec(sql))){
    const t=alias[m[1].toLowerCase()];const c=m[2].toLowerCase();
    if(t&&COLUMNS[t]&&COLUMNS[t].includes(c))highlightCol(t,c,'col-ref');
  }
  const tablesInUse=[...new Set([...sql.matchAll(/\b(?:from|join)\s+([a-z_]\w*)/ig)].map(x=>x[1].toLowerCase()).filter(t=>COLUMNS[t]))];
  if(/(?<![\w.(])\*/.test(sql)){
    tablesInUse.forEach(t=>COLUMNS[t].forEach(c=>highlightCol(t,c,'col-ref')));
  }
  const starRe=/\b([a-z_]\w*)\.\*/ig;let sm;
  while((sm=starRe.exec(sql))){
    const t=alias[sm[1].toLowerCase()];
    if(t&&COLUMNS[t])COLUMNS[t].forEach(c=>highlightCol(t,c,'col-ref'));
  }
  if(tablesInUse.length===1){
    const t=tablesInUse[0];
    COLUMNS[t].forEach(c=>{
      const re=new RegExp('(?<![\\w.])'+c+'(?![\\w])','i');
      if(re.test(sql))highlightCol(t,c,'col-ref');
    });
  }
  const onRe=/\bon\b([\s\S]*?)(?:\bwhere\b|\bgroup\b|\border\b|\blimit\b|\bhaving\b|$)/i;
  const onM=sql.match(onRe);
  if(onM){
    const seg=onM[1];
    const kr=/\b([a-z_]\w*)\.([a-z_]\w*)/ig;let k;
    while((k=kr.exec(seg))){
      const t=alias[k[1].toLowerCase()];const c=k[2].toLowerCase();
      if(t&&COLUMNS[t]&&COLUMNS[t].includes(c)){highlightCol(t,c,'col-key');}
    }
  }
  applyRowHighlights(sql,alias,tablesInUse);
  unionVizKeys();
}
/* Evaluate which ROWS of each table survive the query, and fade the rest.
   Probes the live engine with a rewritten "SELECT id …" version of the query;
   if the rewrite isn't valid SQL (exotic shapes), we silently skip. */
function applyRowHighlights(sql,alias,tablesInUse){
  if(!db||!tablesInUse.length)return;
  if(!/\bwhere\b|\blimit\b|\bjoin\b/i.test(sql))return;   // nothing filters rows → no dimming
  const hasGroup=/\bgroup\s+by\b/i.test(sql);
  const joined=tablesInUse.length>1||/\bjoin\b/i.test(sql);
  tablesInUse.forEach(t=>{
    let probe;
    if(!joined){
      let tail=sql.replace(/^[\s\S]*?\bfrom\b\s+[a-z_]\w*/i,'');
      if(hasGroup)tail=tail.replace(/\bgroup\s+by\b[\s\S]*$/i,'');  // membership = rows fed into the grouping
      probe='SELECT id FROM '+t+' '+tail;
    }else{
      let body=sql.replace(/^\s*select\b[\s\S]*?\bfrom\b/i,'FROM');
      body=body.replace(/\bgroup\s+by\b[\s\S]*$/i,'');
      body=body.replace(/\border\s+by\b[\s\S]*$/i,'');
      probe='SELECT DISTINCT '+t+'.id '+body;
    }
    probe=probe.replace(/;\s*$/,'');
    let ids;
    try{
      const o=db.exec(probe);
      ids=new Set((o.length?o[o.length-1].values:[]).map(r=>r[0]));
    }catch(e){return;}
    document.querySelectorAll('tr[data-rid^="'+t+'."]').forEach(tr=>{
      const id=Number(tr.dataset.rid.split('.')[1]);
      tr.classList.add(ids.has(id)?'row-hit':'row-miss');
    });
  });
}
function isKeyword(w){return KEYWORDS.includes(w)||FUNCS.includes(w);}

/* ---------------- Result table ---------------- */
function renderTable(result){
  const wrap=document.createElement('div');wrap.className='result-scroll';
  const meta=document.createElement('div');meta.className='result-meta';
  meta.textContent=`${result.values.length} row(s) × ${result.columns.length} column(s)`;
  const t=document.createElement('table');t.className='data';
  t.innerHTML='<thead><tr>'+result.columns.map(c=>`<th>${escapeText(c)}</th>`).join('')+'</tr></thead>';
  const tb=document.createElement('tbody');
  result.values.forEach(r=>{
    const tr=document.createElement('tr');
    tr.innerHTML=r.map(v=>{const isNull=v===null||v===undefined;return`<td class="${isNull?'null':''}">${isNull?'NULL':escapeText(String(v))}</td>`;}).join('');
    tb.appendChild(tr);
  });
  t.appendChild(tb);
  const holder=document.createElement('div');
  holder.appendChild(meta);wrap.appendChild(t);holder.appendChild(wrap);
  return holder;
}

let currentJoinType=null;
function initJoinViz(){
  document.querySelectorAll('#join-chips .chip').forEach(ch=>{ch.onclick=()=>selectJoin(ch.dataset.jt);});
  document.getElementById('viz-insert').onclick=()=>{
    if(!currentJoinType)return;
    const ed=document.getElementById('sql');if(!ed)return;
    taEl=ed;
    const kw={inner:'JOIN',left:'LEFT JOIN',right:'RIGHT JOIN',full:'FULL JOIN'}[currentJoinType];
    taEl.value=`SELECT customers.name, orders.product\nFROM customers\n${kw} orders ON customers.id = orders.customer_id`;
    paint();analyzeSql();taEl.focus();
  };
  const pre=CURQ?(CONCEPT_META[CURQ.concept].join||'inner'):'inner';
  selectJoin(pre);
}
function selectJoin(jt){
  currentJoinType=jt;
  document.querySelectorAll('#join-chips .chip').forEach(c=>c.classList.toggle('active',c.dataset.jt===jt));
  const info=JOIN_INFO[jt];
  ['leftonly','overlap','rightonly'].forEach(r=>{
    document.getElementById('r-'+r).classList.toggle('on',info.regions.includes(r));
  });
  document.getElementById('viz-explain').innerHTML=`<b>${info.title}</b> — ${info.text}`;
  const ib=document.getElementById('viz-insert');
  if(ib)ib.style.display=document.getElementById('sql')?'inline-block':'none';
  if(document.getElementById('sql')){
    clearHighlights();hlKeys();
    debouncedAnalyze();
  }else{
    applyHighlightsFor(curTutSql||'');
  }
}

function celebrate(){
  const cv=document.getElementById('confetti'),ctx=cv.getContext('2d');
  cv.width=innerWidth;cv.height=innerHeight;
  const colors=['#7c5cff','#22d3ee','#34d399','#fbbf24','#fb7185','#ffffff'];
  const N=140,parts=[];
  for(let i=0;i<N;i++){
    parts.push({x:innerWidth/2+(Math.random()-0.5)*160,y:innerHeight*0.32,vx:(Math.random()-0.5)*11,vy:Math.random()*-13-4,g:0.32+Math.random()*0.12,s:5+Math.random()*7,rot:Math.random()*6.28,vr:(Math.random()-0.5)*0.4,c:colors[(Math.random()*colors.length)|0]});
  }
  let frames=0;
  (function tick(){
    frames++;
    ctx.clearRect(0,0,cv.width,cv.height);
    parts.forEach(p=>{
      p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.globalAlpha=Math.max(0,1-frames/120);
      ctx.fillStyle=p.c;ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6);
      ctx.restore();
    });
    if(frames<120)requestAnimationFrame(tick);else ctx.clearRect(0,0,cv.width,cv.height);
  })();
}
window.addEventListener('resize',()=>{const cv=document.getElementById('confetti');cv.width=innerWidth;cv.height=innerHeight;});

/* ---------------- Dev self-test ---------------- */
window.__bankTest=function(){
  const perConcept={};let bad=[];
  QUESTIONS.forEach(q=>{
    perConcept[q.concept]=(perConcept[q.concept]||0)+1;
    try{
      const r=db.exec(q.solution);
      const rows=r.length?r[r.length-1].values.length:0;
      if(rows===0)bad.push({id:q.id,err:'EMPTY RESULT'});
      if(q.requires&&!q.requires.test(q.solution))bad.push({id:q.id,err:'REQUIRES FAILS OWN SOLUTION'});
    }catch(e){bad.push({id:q.id,err:e.message});}
  });
  return{total:QUESTIONS.length,perConcept,bad};
};
